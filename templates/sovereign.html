<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>سماء • واجهة السيّد (جوال)</title>

<style>
    body {
        margin: 0;
        background: #0D3B2F;
        font-family: "Inter", sans-serif;
        color: #F5F5F5;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    header {
        padding: 14px;
        background: rgba(0,0,0,0.25);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        text-align: center;
        font-size: 16px;
        font-weight: 700;
    }

    #statusBox {
        padding: 10px;
        background: rgba(255,255,255,0.05);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        font-size: 13px;
        line-height: 1.6;
    }

    #chatBox {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
    }

    .msg {
        padding: 10px 14px;
        border-radius: 14px;
        margin-bottom: 10px;
        font-size: 14px;
        line-height: 1.5;
        max-width: 85%;
        white-space: pre-wrap;
    }

    .user {
        background: #6BB5D6;
        color: #000;
        margin-left: auto;
    }

    .sama {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.15);
        margin-right: auto;
    }

    .inputBar {
        padding: 10px;
        display: flex;
        gap: 8px;
        border-top: 1px solid rgba(255,255,255,0.1);
        background: rgba(0,0,0,0.2);
    }

    #cmdInput {
        flex: 1;
        padding: 12px;
        border-radius: 12px;
        border: none;
        outline: none;
        font-size: 14px;
        background: rgba(255,255,255,0.1);
        color: #fff;
    }

    #sendBtn {
        padding: 12px 16px;
        border-radius: 12px;
        border: none;
        background: #9B59B6;
        color: white;
        font-weight: 600;
        cursor: pointer;
    }

    #sendBtn:active {
        transform: scale(0.96);
    }
</style>
</head>

<body>

<header>🌌 سماء — واجهة السيّد (جوال)</header>

<div id="statusBox">
    <div>الحالة: <span id="stState">—</span></div>
    <div>الأنظمة: <span id="stSys">—</span></div>
    <div>الاستجابة: <span id="stPing">—</span></div>
</div>

<div id="chatBox">
    <div class="msg sama">
        مرحبًا أيها السيّد 👁️‍🗨️  
        هذه نسخة خفيفة للجوال متصلة مباشرة بـ SamaAPI.  
        اكتب أمرك الآن.
    </div>
</div>

<div class="inputBar">
    <input id="cmdInput" type="text" placeholder="أدخل أمرك…" autocomplete="off">
    <button id="sendBtn" onclick="sendCmd()">إرسال</button>
</div>

<script>
// إضافة رسالة
function addMsg(text, who) {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = "msg " + who;
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

// إرسال أمر
async function sendCmd() {
    const input = document.getElementById("cmdInput");
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    const loading = "⏳ جاري الاتصال بسماء…";
    addMsg(loading, "sama");

    const res = await SamaAPI.sendCommand(text);

    // إزالة آخر رسالة (التحميل)
    const msgs = document.querySelectorAll(".sama");
    msgs[msgs.length - 1].remove();

    if (res.success === false) {
        addMsg("❌ " + res.error, "sama");
    } else {
        const reply = res.response || res.message || JSON.stringify(res, null, 2);
        addMsg(reply, "sama");
    }
}

// تحديث الحالة
async function refreshStatus() {
    const stState = document.getElementById("stState");
    const stSys = document.getElementById("stSys");
    const stPing = document.getElementById("stPing");

    const status = await SamaAPI.getStatus();
    const ping = await SamaAPI.ping();

    stState.textContent = status.state || "—";
    stSys.textContent = status.systems_connected ?? "—";
    stPing.textContent = ping.latency_ms + "ms";
}

refreshStatus();
setInterval(refreshStatus, 8000);

// Enter للإرسال
document.getElementById("cmdInput").addEventListener("keydown", e => {
    if (e.key === "Enter") sendCmd();
});
</script>

</body>
</html>
