<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سماء • Sky AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* =============================================
       سماء - الواجهة الذكية الحية v6.0 (المستقبلية)
    ============================================= */
    :root {
      --primary: #6366f1;
      --accent: #d946ef;
      --bg: #090d16;
      --card: rgba(22, 28, 45, 0.6);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: rgba(99, 102, 241, 0.15);
      --glow: rgba(99, 102, 241, 0.3);
      --user-bubble: linear-gradient(135deg, #4f46e5, #c026d3);
      --assistant-bubble: rgba(30, 41, 59, 0.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Cairo', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; 
      align-items: center; 
      justify-content: center;
      padding: 0;
      overflow: hidden;
      position: relative;
    }

    /* خلفية الجسيمات الحية */
    #ambient-particles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* حاوية التطبيق الذكي الذائب في الخلفية */
    .chat-app {
      width: 100%; max-width: 760px; height: 100vh;
      background: var(--card);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      display: flex; flex-direction: column; 
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
      z-index: 2;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(99, 102, 241, 0.05);
    }

    @media (min-width: 768px) {
      .chat-app {
        height: 92vh;
        max-height: 850px;
        border-radius: 32px;
        box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
      }
    }

    /* الشريط العلوي - النبض العصبي */
    .top-bar {
      padding: 16px 22px; display: flex; justify-content: space-between; align-items: center;
      background: rgba(15, 23, 42, 0.4); 
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .brand { display: flex; align-items: center; gap: 14px; }
    
    /* الأفاتار الحي - يتنفس */
    .avatar {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 22px;
      position: relative;
      box-shadow: 0 0 15px var(--glow);
      animation: livingPulse 3s infinite ease-in-out;
    }
    
    /* هالة الوعي الخارجي خلف الأفاتار */
    .avatar::after {
      content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
      border-radius: 18px; background: linear-gradient(135deg, var(--primary), var(--accent));
      z-index: -1; opacity: 0.5; filter: blur(6px);
    }

    .title {
      font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(90deg, #ffffff, #a5b4fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { font-size: 0.75rem; color: var(--text-muted); margin-top: -1px; display: flex; align-items: center; gap: 5px; }
    .subtitle::before { content: ''; width: 6px; height: 6px; background: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #10b981; }

    .icon-btn {
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.05);
      color: var(--text-muted); width: 38px; height: 38px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .icon-btn:hover { color: #ef4444; background: rgba(239, 68, 68, 0.1); transform: scale(1.05); }

    /* منطقة الشات والتدفق الحيوي */
    .chat-area { 
      flex: 1; overflow-y: auto; padding: 22px 18px; 
      background: rgba(10, 15, 26, 0.4);
      scroll-behavior: smooth;
    }
    .messages { display: flex; flex-direction: column; gap: 16px; }

    /* فقاعات الرسائل العضوية */
    .message {
      max-width: 85%; padding: 14px 18px; border-radius: 22px;
      position: relative; line-height: 1.6; font-size: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transform-origin: top;
      animation: messageEnter 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    
    .message.user {
      background: var(--user-bubble); color: white; align-self: flex-end; 
      border-bottom-right-radius: 4px; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.25);
    }
    .message.assistant {
      background: var(--assistant-bubble); border: 1px solid var(--border);
      color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px;
      backdrop-filter: blur(5px);
    }

    /* مؤشر الوعي والتفكير */
    .typing-indicator {
      align-self: flex-start; background: var(--assistant-bubble); border: 1px solid var(--border);
      padding: 12px 18px; border-radius: 20px; display: flex; align-items: center; gap: 8px;
      color: var(--text-muted); font-size: 0.85rem;
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.05);
      animation: thinkingPulse 2s infinite ease-in-out;
    }
    .dot-container { display: flex; gap: 4px; align-items: center; }
    .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: wave 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; background: var(--primary); }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    .hidden { display: none !important; }

    /* شريط الإدخال والهالة العصبية */
    .input-bar { 
      padding: 16px; 
      background: rgba(15, 23, 42, 0.6); 
      border-top: 1px solid var(--border); 
    }
    .input-container {
      display: flex; align-items: center; gap: 8px;
      background: rgba(30, 41, 59, 0.7); 
      border-radius: 24px; padding: 6px 10px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }
    .input-container:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--glow);
      transform: translateY(-1px);
    }
    
    #message-input { 
      flex: 1; border: none; font-size: 15px; outline: none; 
      background: transparent; color: white; padding: 8px 4px;
    }
    #message-input::placeholder { color: rgba(255,255,255,0.3); }

    .input-bar .icon-btn {
      background: transparent; border: none; color: var(--text-muted);
    }
    .input-bar .icon-btn:hover { color: var(--primary); background: rgba(99, 102, 241, 0.1); }

    .send-button {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white; border: none; width: 40px; height: 40px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
    }
    .send-button:hover { transform: scale(1.05); filter: brightness(1.1); box-shadow: 0 0 15px var(--accent); }

    /* ملفات المرفقات الذكية */
    .file-preview-wrapper {
      display: flex; flex-wrap: wrap; gap: 8px; padding: 0 8px;
    }
    .file-preview {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255, 255, 255, 0.05); padding: 6px 12px; border-radius: 12px; 
      margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05);
      font-size: 0.8rem; animation: messageEnter 0.2s ease;
    }
    .file-preview button {
      background: transparent; border: none; color: #ef4444; font-size: 1rem; cursor: pointer;
    }

    /* تحسين شريط التمرير (Scrollbar) ليصبح خفياً وذكياً */
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.2); border-radius: 99px; }

    /* الأنيميشنات الحية الحركية */
    @keyframes messageEnter { 
      from { opacity: 0; transform: translateY(12px) scale(0.98); } 
      to { opacity: 1; transform: translateY(0) scale(1); } 
    }
    @keyframes wave { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    @keyframes livingPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }
      50% { transform: scale(1.03); box-shadow: 0 0 25px rgba(217, 70, 239, 0.5); }
    }
    @keyframes thinkingPulse {
      0%, 100% { border-color: var(--border); box-shadow: 0 0 15px rgba(99, 102, 241, 0.05); }
      50% { border-color: var(--accent); box-shadow: 0 0 20px rgba(217, 70, 239, 0.15); }
    }
  </style>
</head>
<body>

  <canvas id="ambient-particles"></canvas>

  <div class="chat-app">
    <div class="top-bar">
      <div class="brand">
        <div class="avatar"><i class="fas fa-feather-alt"></i></div>
        <div>
          <div class="title">سماء</div>
          <div class="subtitle">رفيقتك الدافئة</div>
        </div>
      </div>
      <div>
        <button id="clear-chat" class="icon-btn" title="مسح المحادثة"><i class="fas fa-trash-alt"></i></button>
      </div>
    </div>

    <div class="chat-area" id="chat-area">
      <div class="messages" id="messages"></div>
      
      <div id="typing-indicator" class="typing-indicator hidden">
        <span>سماء تعي وتفكر</span>
        <div class="dot-container">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <div id="file-preview-container" class="file-preview-wrapper"></div>
      <div class="input-container">
        <input type="file" id="file-input" style="display: none;" multiple>
        <button id="attach-btn" class="icon-btn" title="إرفاق ملف"><i class="fas fa-paperclip"></i></button>
        <input type="text" id="message-input" placeholder="اكتب لسماء، إنها تستمع إليك..." autocomplete="off">
        <button id="send-btn" class="send-button"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <script>
    // 1. نظام محرك الجسيمات الحية التفاعلية الخلفية (Ambient Particles Network)
    const canvas = document.getElementById('ambient-particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = Math.random() * 0.4 - 0.2;
        this.speedY = Math.random() * 0.4 - 0.2;
        this.opacity = Math.random() * 0.5 + 0.2;
      }
      update(touchX, touchY) {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x > canvas.width) this.x = 0;
        else if (this.x < 0) this.x = canvas.width;
        if (this.y > canvas.height) this.y = 0;
        else if (this.y < 0) this.y = canvas.height;

        // تفاعل ذكي خفيف عند لمس شاشة الموبايل
        if (touchX && touchY) {
          let dx = touchX - this.x;
          let dy = touchY - this.y;
          let distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < 100) {
            this.x += dx * 0.02;
            this.y += dy * 0.02;
          }
        }
      }
      draw() {
        ctx.fillStyle = `rgba(99, 102, 241, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // تقليل العدد للموبايل للحفاظ على الأداء المذهل والسلاسة
    const particleCount = 45;
    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    let lastTouchX = null;
    let lastTouchY = null;
    window.addEventListener('pointermove', (e) => {
      lastTouchX = e.clientX;
      lastTouchY = e.clientY;
    });
    window.addEventListener('pointerleave', () => {
      lastTouchX = null; lastTouchY = null;
    });

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update(lastTouchX, lastTouchY);
        p.draw();
      });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // 2. منطق التطبيق والمحادثة والتكامل (SkyChat Machine)
    class SkyChat {
      constructor() {
        this.messagesEl = document.getElementById('messages');
        this.input = document.getElementById('message-input');
        this.sendBtn = document.getElementById('send-btn');
        this.typing = document.getElementById('typing-indicator');
        this.clearBtn = document.getElementById('clear-chat');
        this.attachBtn = document.getElementById('attach-btn');
        this.fileInput = document.getElementById('file-input');
        this.filePreviewContainer = document.getElementById('file-preview-container');

        this.sessionId = localStorage.getItem('sky_session') || this.generateSessionId();
        this.selectedFiles = [];

        this.init();
      }

      generateSessionId() {
        const id = 'sky-' + Date.now();
        localStorage.setItem('sky_session', id);
        return id;
      }

      init() {
        this.sendBtn.addEventListener('click', () => this.sendMessage());
        this.input.addEventListener('keypress', e => {
          if (e.key === 'Enter') this.sendMessage();
        });
        this.clearBtn.addEventListener('click', () => this.clearChat());
        this.attachBtn.addEventListener('click', () => this.fileInput.click());
        this.fileInput.addEventListener('change', () => this.handleFileSelect());

        this.restoreMessages();
        this.showWelcomeIfEmpty();
      }

      async sendMessage() {
        const text = this.input.value.trim();
        if (!text && this.selectedFiles.length === 0) return;

        if (text) this.addMessage(text, 'user');
        this.input.value = '';

        // معالجة المرفقات
        for (let file of this.selectedFiles) {
          await this.uploadFile(file);
        }
        this.selectedFiles = [];
        this.filePreviewContainer.innerHTML = '';

        if (!text) return;

        this.showTyping(true);

        try {
          const res = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, session_id: this.sessionId })
          });
          const data = await res.json();
          this.showTyping(false);
          if (data.reply) this.addMessage(data.reply, 'assistant');
        } catch {
          this.showTyping(false);
          this.addMessage('حدث خطأ غير متوقع في الاتصال بسماء. اعد المحاولة لطفاً.', 'assistant');
        }
      }

      async uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('session_id', this.sessionId);

        try {
          const res = await fetch('/upload', { method: 'POST', body: formData });
          const data = await res.json();
          if (data.reply) this.addMessage(data.reply, 'assistant');
        } catch {
          this.addMessage('فشل في معالجة ورفع الملف المرفق.', 'assistant');
        }
      }

      handleFileSelect() {
        const files = Array.from(this.fileInput.files);
        this.selectedFiles = [...this.selectedFiles, ...files];
        this.renderFilePreviews();
        this.fileInput.value = '';
      }

      renderFilePreviews() {
        this.filePreviewContainer.innerHTML = '';
        this.selectedFiles.forEach((file, index) => {
          const div = document.createElement('div');
          div.className = 'file-preview';
          div.innerHTML = `
            <span><i class="fas fa-file-alt" style="margin-left: 5px; color: var(--primary);"></i>${file.name.crypto || file.name.substring(0,20)}</span>
            <button onclick="window.SkyChat.removeFile(${index})">×</button>
          `;
          this.filePreviewContainer.appendChild(div);
        });
      }

      removeFile(index) {
        this.selectedFiles.splice(index, 1);
        this.renderFilePreviews();
      }

      addMessage(content, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerHTML = content.replace(/\n/g, '<br>');
        this.messagesEl.appendChild(div);
        this.saveMessageToLocal(content, sender);
        this.scrollToBottom();
      }

      showTyping(show) {
        this.typing.classList.toggle('hidden', !show);
        this.scrollToBottom();
      }

      scrollToBottom() {
        const chatArea = document.getElementById('chat-area');
        chatArea.scrollTop = chatArea.scrollHeight;
      }

      showWelcomeIfEmpty() {
        if (this.messagesEl.children.length === 0) {
          this.addMessage('مرحباً بك... أنا سماء، رفيقتك الدافئة هنا دائماً للاستماع إليك ومساعدتك بذكاء وعمق. كيف حال روحك اليوم؟ ✨', 'assistant');
        }
      }

      saveMessageToLocal(content, sender) {
        let history = JSON.parse(localStorage.getItem(`history_${this.sessionId}`)) || [];
        history.push({ content, sender });
        localStorage.setItem(`history_${this.sessionId}`, JSON.stringify(history));
      }

      restoreMessages() {
        let history = JSON.parse(localStorage.getItem(`history_${this.sessionId}`)) || [];
        history.forEach(msg => {
          const div = document.createElement('div');
          div.className = `message ${msg.sender}`;
          div.innerHTML = msg.content.replace(/\n/g, '<br>');
          this.messagesEl.appendChild(div);
        });
        this.scrollToBottom();
      }

      clearChat() {
        if (!confirm('هل تود مسح الذاكرة الحالية وجلسة المحادثة؟')) return;
        this.messagesEl.innerHTML = '';
        localStorage.removeItem(`history_${this.sessionId}`);
        localStorage.removeItem('sky_session');
        this.sessionId = this.generateSessionId();
        this.showWelcomeIfEmpty();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      window.SkyChat = new SkyChat();
    });
  </script>
</body>
</html>
