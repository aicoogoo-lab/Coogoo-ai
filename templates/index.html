<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>SkyOS Crown Edition — الذكاء الهجين النهائي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0a0a14" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        /* ============================================================
           SkyOS v7.2 — Crown Edition
           Holographic • Liquid • Alive • Intelligent
           ============================================================ */

        /* ------------------------------
           ROOT VARIABLES — Dynamic Theme
           ------------------------------ */

        :root {
          --bg: #0a0a14;
          --bg-2: #0f0f1f;
          --bg-3: #141428;
          --glass: rgba(255, 255, 255, 0.06);
          --glass-strong: rgba(255, 255, 255, 0.12);
          --border: rgba(255, 255, 255, 0.12);
          --border-strong: rgba(255, 255, 255, 0.22);
          --text: #ffffff;
          --text-soft: #d1d5db;
          --text-muted: #9ca3af;
          --primary: #7c3aed;
          --primary-2: #a855f7;
          --primary-3: #c084fc;
          --accent: #00eaff;
          --radius: 16px;
          --radius-lg: 22px;
          --shadow: 0 0 40px rgba(0, 0, 0, 0.4);
          --transition: 0.25s ease;
          --transition-fast: 0.15s ease;
        }

        /* Light Mode */
        body.light {
          --bg: #f5f6ff;
          --bg-2: #ffffff;
          --bg-3: #eef1ff;
          --glass: rgba(0, 0, 0, 0.06);
          --glass-strong: rgba(0, 0, 0, 0.12);
          --border: rgba(0, 0, 0, 0.12);
          --border-strong: rgba(0, 0, 0, 0.22);
          --text: #111827;
          --text-soft: #374151;
          --text-muted: #6b7280;
          --primary: #4f46e5;
          --primary-2: #6366f1;
          --primary-3: #818cf8;
          --accent: #06b6d4;
        }

        /* ------------------------------
           GLOBAL RESET
           ------------------------------ */

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        html, body {
          height: 100%;
          overflow: hidden;
          font-family: "Cairo", sans-serif;
          background: var(--bg);
          color: var(--text);
        }

        /* ------------------------------
           BACKGROUND — Holographic Layers
           ------------------------------ */

        .sky-background {
          position: fixed;
          inset: 0;
          overflow: hidden;
          z-index: 0;
        }

        .sky-gradient {
          position: absolute;
          inset: 0;
          background: radial-gradient(circle at 20% 30%, rgba(124, 58, 237, 0.35), transparent 60%),
                      radial-gradient(circle at 80% 70%, rgba(0, 234, 255, 0.25), transparent 60%);
          filter: blur(80px);
          animation: gradientMove 18s infinite alternate ease-in-out;
        }

        @keyframes gradientMove {
          0% { transform: translate(0, 0) scale(1); }
          100% { transform: translate(-40px, 40px) scale(1.2); }
        }

        .sky-glow-layer {
          position: absolute;
          inset: 0;
          background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0));
          mix-blend-mode: overlay;
        }

        canvas#sky-particles {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
        }

        /* ------------------------------
           GLASS EFFECT
           ------------------------------ */

        .glass-layer {
          background: var(--glass);
          backdrop-filter: blur(18px);
          border: 1px solid var(--border);
          box-shadow: var(--shadow);
        }

        /* ------------------------------
           TOPBAR
           ------------------------------ */

        .sky-topbar {
          height: 70px;
          padding: 0 26px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          background: var(--glass-strong);
          border-bottom: 1px solid var(--border-strong);
          backdrop-filter: blur(22px);
          z-index: 20;
          position: relative;
        }

        .sky-brand {
          display: flex;
          align-items: center;
          gap: 12px;
        }

        .sky-logo {
          width: 48px;
          height: 48px;
          border-radius: var(--radius-lg);
          background: linear-gradient(135deg, var(--primary), var(--primary-3));
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 1.6rem;
          color: #fff;
          box-shadow: 0 0 20px var(--primary-3);
          animation: logoPulse 3s infinite ease-in-out;
        }

        @keyframes logoPulse {
          0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--primary-3); }
          50% { transform: scale(1.08); box-shadow: 0 0 40px var(--primary-2); }
        }

        .sky-brand-title {
          font-size: 1.4rem;
          font-weight: 700;
          background: linear-gradient(135deg, #fff, var(--primary-3));
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
        }

        .sky-brand-subtitle {
          font-size: 0.7rem;
          color: var(--text-muted);
        }

        .sky-status {
          display: flex;
          align-items: center;
          gap: 8px;
          background: var(--glass);
          padding: 6px 16px;
          border-radius: 100px;
          border: 1px solid var(--border);
        }

        .sky-status-dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: #22c55e;
          animation: pulseDot 2s infinite;
        }

        @keyframes pulseDot {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.5; transform: scale(1.2); }
        }

        .sky-topbar-actions {
          display: flex;
          gap: 8px;
        }

        .sky-icon-btn {
          background: var(--glass);
          border: 1px solid var(--border);
          padding: 8px 12px;
          border-radius: 12px;
          cursor: pointer;
          font-size: 1.1rem;
          transition: var(--transition-fast);
          color: var(--text);
        }

        .sky-icon-btn:hover {
          background: var(--primary);
          border-color: var(--primary-3);
          transform: scale(1.05);
        }

        /* ------------------------------
           LAYOUT
           ------------------------------ */

        .sky-layout {
          display: flex;
          height: calc(100vh - 70px);
          position: relative;
          z-index: 5;
        }

        /* ------------------------------
           SIDEBAR
           ------------------------------ */

        .sky-sidebar {
          width: 300px;
          background: var(--glass);
          border-inline-end: 1px solid var(--border);
          padding: 24px;
          overflow-y: auto;
          backdrop-filter: blur(20px);
          z-index: 10;
          transition: transform 0.3s ease;
        }

        @media (max-width: 768px) {
          .sky-sidebar {
            position: fixed;
            right: -300px;
            top: 70px;
            height: calc(100vh - 70px);
            z-index: 100;
          }
          .sky-sidebar.open {
            right: 0;
          }
        }

        .sky-sidebar-section {
          margin-bottom: 28px;
        }

        .sky-sidebar-title {
          font-size: 0.75rem;
          color: var(--text-muted);
          margin-bottom: 12px;
          letter-spacing: 1px;
          text-transform: uppercase;
          display: flex;
          align-items: center;
          gap: 6px;
        }

        .sky-btn-primary {
          width: 100%;
          padding: 12px;
          border-radius: var(--radius);
          background: linear-gradient(135deg, var(--primary), var(--primary-3));
          border: none;
          color: white;
          font-weight: 600;
          cursor: pointer;
          transition: var(--transition-fast);
        }

        .sky-btn-primary:hover {
          transform: translateY(-2px);
          box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
        }

        .sky-btn-secondary {
          width: 100%;
          padding: 10px;
          border-radius: var(--radius);
          background: var(--glass-strong);
          border: 1px solid var(--border);
          color: var(--text);
          cursor: pointer;
          transition: var(--transition-fast);
          margin-bottom: 8px;
        }

        .sky-btn-secondary:hover {
          background: var(--glass);
          border-color: var(--primary-3);
        }

        .session-item {
          padding: 10px 14px;
          border-radius: var(--radius);
          background: transparent;
          border: 1px solid transparent;
          color: var(--text-soft);
          cursor: pointer;
          transition: var(--transition);
          margin-bottom: 6px;
        }

        .session-item:hover {
          background: var(--glass-strong);
          border-color: var(--primary-3);
          transform: translateY(-2px);
        }

        /* ------------------------------
           MAIN CHAT AREA
           ------------------------------ */

        .sky-main {
          flex: 1;
          display: flex;
          flex-direction: column;
          background: transparent;
          position: relative;
          z-index: 5;
        }

        .sky-chat-header {
          padding: 20px 26px;
          background: var(--glass);
          border-bottom: 1px solid var(--border);
          backdrop-filter: blur(20px);
        }

        .sky-chat-title {
          font-size: 1.3rem;
          font-weight: 700;
          background: linear-gradient(135deg, var(--text), var(--primary-3));
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
        }

        .sky-chat-subtitle {
          font-size: 0.75rem;
          color: var(--text-muted);
          margin-top: 4px;
        }

        .sky-chat-meta {
          display: flex;
          gap: 20px;
          margin-top: 12px;
        }

        .sky-chat-meta-item {
          display: flex;
          align-items: center;
          gap: 6px;
          font-size: 0.7rem;
          color: var(--text-muted);
        }

        .dot {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: var(--primary-3);
        }

        /* ------------------------------
           CHAT WINDOW
           ------------------------------ */

        .sky-chat-window {
          flex: 1;
          padding: 26px;
          overflow-y: auto;
          position: relative;
        }

        .sky-chat-window::-webkit-scrollbar {
          width: 6px;
        }

        .sky-chat-window::-webkit-scrollbar-track {
          background: var(--glass);
          border-radius: 10px;
        }

        .sky-chat-window::-webkit-scrollbar-thumb {
          background: var(--primary);
          border-radius: 10px;
        }

        /* Message Rows */
        .message-row {
          display: flex;
          gap: 14px;
          margin-bottom: 22px;
          animation: fadeIn 0.25s ease-out;
        }

        .message-row.user {
          flex-direction: row-reverse;
        }

        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(6px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
          width: 46px;
          height: 46px;
          border-radius: var(--radius-lg);
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 1.3rem;
          color: #fff;
          box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
          flex-shrink: 0;
        }

        .assistant-avatar {
          background: linear-gradient(135deg, var(--primary), var(--primary-3));
        }

        .user-avatar {
          background: linear-gradient(135deg, #374151, #111827);
        }

        /* Message Bubble */
        .message-bubble {
          max-width: 75%;
          padding: 16px 20px;
          border-radius: var(--radius-lg);
          background: var(--glass);
          border: 1px solid var(--border);
          backdrop-filter: blur(14px);
          box-shadow: var(--shadow);
          animation: bubbleAppear 0.25s ease-out;
        }

        .message-row.user .message-bubble {
          background: linear-gradient(135deg, var(--primary), var(--primary-2));
          border: none;
        }

        .message-row.user .message-bubble .message-header .message-author {
          color: rgba(255,255,255,0.9);
        }

        .message-row.user .message-content {
          color: white;
        }

        @keyframes bubbleAppear {
          from { transform: scale(0.96); opacity: 0; }
          to { transform: scale(1); opacity: 1; }
        }

        .message-header {
          display: flex;
          justify-content: space-between;
          margin-bottom: 8px;
          font-size: 0.7rem;
          color: var(--text-muted);
        }

        .message-author {
          font-weight: 600;
          color: var(--primary-3);
        }

        .message-content {
          line-height: 1.6;
          font-size: 0.9rem;
        }

        /* Typing Indicator */
        .typing-indicator {
          display: flex;
          gap: 6px;
          align-items: center;
        }

        .typing-indicator span {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: var(--primary-3);
          animation: typingBounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
          0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
          30% { transform: translateY(-10px); opacity: 1; }
        }

        /* Feedback Buttons */
        .message-feedback {
          display: flex;
          gap: 12px;
          margin-top: 12px;
          padding-top: 8px;
          border-top: 1px solid var(--border);
        }

        .feedback-btn {
          background: none;
          border: none;
          cursor: pointer;
          color: var(--text-muted);
          transition: var(--transition-fast);
          font-size: 0.9rem;
        }

        .feedback-btn:hover {
          color: var(--primary-3);
          transform: scale(1.1);
        }

        /* ------------------------------
           INPUT BAR
           ------------------------------ */

        .sky-input-bar {
          padding: 16px 26px;
          background: var(--glass-strong);
          border-top: 1px solid var(--border);
          backdrop-filter: blur(20px);
          display: flex;
          gap: 12px;
          align-items: flex-end;
        }

        .sky-input-tools {
          display: flex;
          gap: 8px;
        }

        .sky-input {
          flex: 1;
          padding: 14px 20px;
          border-radius: 999px;
          border: 1px solid var(--border);
          background: var(--bg-2);
          color: var(--text);
          resize: none;
          transition: var(--transition-fast);
          font-family: inherit;
          font-size: 0.9rem;
        }

        .sky-input:focus {
          outline: none;
          border-color: var(--primary-3);
          box-shadow: 0 0 12px var(--primary-2);
        }

        .sky-send-btn {
          padding: 14px 26px;
          border-radius: 999px;
          background: linear-gradient(135deg, var(--primary), var(--primary-3));
          color: #fff;
          border: none;
          cursor: pointer;
          font-weight: 700;
          transition: var(--transition-fast);
          box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
        }

        .sky-send-btn:hover {
          transform: translateY(-2px);
          box-shadow: 0 0 30px rgba(124, 58, 237, 0.6);
        }

        /* ------------------------------
           TOASTS
           ------------------------------ */

        #toast-container {
          position: fixed;
          bottom: 20px;
          right: 20px;
          z-index: 1000;
        }

        .toast {
          background: var(--glass-strong);
          border: 1px solid var(--border);
          padding: 12px 20px;
          border-radius: var(--radius);
          backdrop-filter: blur(14px);
          box-shadow: var(--shadow);
          color: var(--text-soft);
          animation: toastIn 0.25s ease-out;
          margin-top: 10px;
          display: flex;
          align-items: center;
          gap: 10px;
        }

        @keyframes toastIn {
          from { opacity: 0; transform: translateX(20px); }
          to { opacity: 1; transform: translateX(0); }
        }

        /* ------------------------------
           PANELS
           ------------------------------ */

        .sky-settings,
        .sky-workspace {
          position: fixed;
          top: 80px;
          right: 20px;
          width: 360px;
          max-height: calc(100vh - 100px);
          background: var(--glass-strong);
          border: 1px solid var(--border);
          border-radius: var(--radius-lg);
          padding: 20px;
          backdrop-filter: blur(20px);
          box-shadow: var(--shadow);
          opacity: 0;
          transform: translateY(20px);
          pointer-events: none;
          transition: var(--transition);
          z-index: 200;
          overflow-y: auto;
        }

        .sky-settings.visible,
        .sky-workspace.visible {
          opacity: 1;
          transform: translateY(0);
          pointer-events: auto;
        }

        .sky-settings.hidden,
        .sky-workspace.hidden {
          display: none;
        }

        /* Drag Over Effect */
        .sky-chat-window.drag-over {
          border: 2px dashed var(--primary-3);
          background: var(--glass);
        }

        /* Responsive */
        @media (max-width: 600px) {
          .sky-topbar { padding: 0 16px; }
          .sky-chat-window { padding: 16px; }
          .message-bubble { max-width: 85%; }
          .sky-settings, .sky-workspace { width: calc(100% - 40px); right: 20px; }
        }
    </style>
</head>

<body>
    <!-- Background -->
    <div class="sky-background">
        <canvas id="sky-particles"></canvas>
        <div class="sky-gradient"></div>
        <div class="sky-glow-layer"></div>
    </div>

    <div id="sky-root">
        <!-- Topbar -->
        <header class="sky-topbar">
            <div class="sky-brand">
                <div class="sky-logo">
                    <i class="fas fa-brain"></i>
                </div>
                <div class="sky-brand-text">
                    <div class="sky-brand-title">SkyOS Crown</div>
                    <div class="sky-brand-subtitle">Hybrid Intelligence • v7.2</div>
                </div>
            </div>

            <div class="sky-status" id="connection-status">
                <div class="sky-status-dot"></div>
                <span class="sky-status-text"><i class="fas fa-plug"></i> متصل • جاهز</span>
            </div>

            <div class="sky-topbar-actions">
                <button class="sky-icon-btn" id="toggle-theme-btn" title="الوضع"><i class="fas fa-moon"></i></button>
                <button class="sky-icon-btn" id="open-settings-btn" title="الإعدادات"><i class="fas fa-cog"></i></button>
                <button class="sky-icon-btn" id="menu-toggle" title="القائمة"><i class="fas fa-bars"></i></button>
            </div>
        </header>

        <div class="sky-layout">
            <!-- Sidebar -->
            <aside class="sky-sidebar" id="sidebar">
                <div class="sky-sidebar-section">
                    <div class="sky-sidebar-title"><i class="fas fa-plus-circle"></i> الجلسات</div>
                    <button class="sky-btn-primary" id="new-session-btn"><i class="fas fa-plus"></i> جلسة جديدة</button>
                </div>

                <div class="sky-sidebar-section">
                    <div class="sky-sidebar-title"><i class="fas fa-history"></i> الأرشيف</div>
                    <div id="session-list"></div>
                </div>

                <div class="sky-sidebar-section">
                    <div class="sky-sidebar-title"><i class="fas fa-paperclip"></i> الملفات</div>
                    <label class="sky-btn-secondary" style="display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;">
                        <i class="fas fa-upload"></i> رفع ملف
                        <input type="file" id="file-input" hidden />
                    </label>
                </div>

                <div class="sky-sidebar-section">
                    <div class="sky-sidebar-title"><i class="fas fa-microphone"></i> الصوت والرؤية</div>
                    <button class="sky-btn-secondary" id="voice-btn"><i class="fas fa-microphone"></i> إرسال صوت</button>
                    <button class="sky-btn-secondary" id="vision-btn"><i class="fas fa-image"></i> إرسال صورة</button>
                    <button class="sky-btn-secondary" id="clear-chat-btn"><i class="fas fa-trash-alt"></i> مسح المحادثة</button>
                </div>
            </aside>

            <!-- Main Chat -->
            <main class="sky-main">
                <div class="sky-chat-header">
                    <div>
                        <div class="sky-chat-title"><i class="fas fa-comments"></i> جلسة مع SkyOS</div>
                        <div class="sky-chat-subtitle">ذكاء هجين واعٍ • يتذكر • يحلل • يتطور</div>
                    </div>
                    <div class="sky-chat-meta">
                        <div class="sky-chat-meta-item">
                            <div class="dot"></div>
                            <span id="model-indicator"><i class="fas fa-microchip"></i> النموذج: تلقائي</span>
                        </div>
                        <div class="sky-chat-meta-item">
                            <div class="dot"></div>
                            <span id="session-indicator"><i class="fas fa-id-card"></i> جلسة جديدة</span>
                        </div>
                    </div>
                </div>

                <section class="sky-chat-window" id="chat-window"></section>

                <footer class="sky-input-bar">
                    <div class="sky-input-tools">
                        <button class="sky-icon-btn" id="mini-upload-btn" title="رفع ملف"><i class="fas fa-paperclip"></i></button>
                        <button class="sky-icon-btn" id="mini-voice-btn" title="إرسال صوت"><i class="fas fa-microphone"></i></button>
                        <button class="sky-icon-btn" id="mini-vision-btn" title="إرسال صورة"><i class="fas fa-camera"></i></button>
                    </div>

                    <textarea id="user-input" class="sky-input" placeholder="اكتب لـ SkyOS..." rows="1"></textarea>

                    <button class="sky-send-btn" id="send-btn"><i class="fas fa-paper-plane"></i> إرسال</button>
                </footer>
            </main>
        </div>

        <!-- Hidden Inputs -->
        <input type="file" id="hidden-audio-input" accept="audio/*" hidden />
        <input type="file" id="hidden-image-input" accept="image/*" hidden />

        <!-- Panels -->
        <div id="toast-container"></div>
        <div id="settings-panel" class="sky-settings hidden"></div>
        <div id="workspace-panel" class="sky-workspace hidden"></div>
    </div>

    <script>
        // Configuration
        const SKY_CONFIG = {
            endpoints: {
                ask: "/ask",
                upload: "/upload",
                voice: "/voice",
                vision: "/vision",
                feedback: "/feedback",
                clear: "/clear",
                status: "/api/v1/status"
            }
        };

        // ============================================================
        // SkyOS Crown Edition — Complete JavaScript
        // ============================================================

        (() => {
            "use strict";

            const ENDPOINTS = SKY_CONFIG.endpoints;
            const LS_SESSION_KEY = "sky_session_id_crown";
            const LS_SESSIONS_LIST = "sky_sessions_list_crown";
            const LS_THEME_KEY = "sky_theme_crown";
            const LS_NOTES_KEY = "sky_workspace_notes_crown";

            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => Array.from(document.querySelectorAll(sel));

            // State
            let sessionId = loadOrCreateSessionId();
            let sessions = loadSessions();
            let isDark = loadTheme();
            let isSending = false;

            // DOM Elements
            const chatWindow = $("#chat-window");
            const userInput = $("#user-input");
            const sendBtn = $("#send-btn");
            const fileInput = $("#file-input");
            const hiddenAudioInput = $("#hidden-audio-input");
            const hiddenImageInput = $("#hidden-image-input");
            const newSessionBtn = $("#new-session-btn");
            const sessionListEl = $("#session-list");
            const voiceBtn = $("#voice-btn");

            const miniUploadBtn = $("#mini-upload-btn");

            // Canvas Particles
            const canvas = document.getElementById("sky-particles");
            let ctx = canvas?.getContext("2d");
            let particles = [];

            function resizeCanvas() {
                if (canvas) {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
            }

            class Particle {
                constructor() {
                    this.x = Math.random() * (canvas?.width || window.innerWidth);
                    this.y = Math.random() * (canvas?.height || window.innerHeight);
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.3;
                    this.speedY = (Math.random() - 0.5) * 0.3;
                    this.opacity = Math.random() * 0.3 + 0.1;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0) this.x = canvas?.width || window.innerWidth;
                    if (this.x > (canvas?.width || window.innerWidth)) this.x = 0;
                    if (this.y < 0) this.y = canvas?.height || window.innerHeight;
                    if (this.y > (canvas?.height || window.innerHeight)) this.y = 0;
                }
                draw() {
                    if (!ctx) return;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(124, 58, 237, ${this.opacity})`;
                    ctx.fill();
                }
            }

            function initParticles() {
                if (!canvas || !ctx) return;
                particles = [];
                const count = Math.min(80, Math.floor((canvas.width * canvas.height) / 20000));
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle());
                }
            }

            function animateParticles() {
                if (!ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animateParticles);
            }

            if (canvas && ctx) {
                resizeCanvas();
                initParticles();
                animateParticles();
                window.addEventListener("resize", () => {
                    resizeCanvas();
                    initParticles();
                });
            }

            function sanitizeAndFormat(text) {
                if (!text) return "";
                const div = document.createElement("div");
                div.textContent = text;
                let safe = div.innerHTML;
                safe = safe.replace(/(https?:\/\/[^\s]+)/g, m => `<a href="${m}" target="_blank" style="color: var(--primary-3);">${m}</a>`);
                safe = safe.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
                safe = safe.replace(/\*(.*?)\*/g, "<em>$1</em>");
                safe = safe.replace(/\n{2,}/g, "</p><p>").replace(/\n/g, "<br/>");
                return `<p>${safe}</p>`;
            }

                        <button class="feedback-btn bad" data-score="-1" data-id="${id}"><i class="fas fa-thumbs-down"></i></button>
                    `;

                }
                
                row.appendChild(avatar);
                row.appendChild(bubble);
                chatWindow.appendChild(row);
                scrollToBottom();
                return id;
            }

            function exportChat() {
                const messages = $$("#chat-window .message-row");
                if (!messages.length) { showToast("لا توجد رسائل لتصديرها", "error"); return; }
                let exportText = `SkyOS Chat Export\nSession: ${sessionId}\nDate: ${new Date().toLocaleString("ar-SA")}\n${"=".repeat(50)}\n\n`;
                messages.forEach(msg => {
                    const isUser = msg.classList.contains("user");
                    const content = msg.querySelector(".message-content")?.innerText || "";
                    const time = msg.querySelector(".message-time")?.innerText || "";
                    exportText += `[${isUser ? "أنت" : "SkyOS"}] ${time}\n${content}\n${"-".repeat(40)}\n`;
                });
                const blob = new Blob([exportText], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `skyos_chat_${sessionId.slice(0, 8)}.txt`;
                a.click();
                URL.revokeObjectURL(url);
                showToast("تم تصدير المحادثة", "success");
            }

                    const div = document.createElement("div");
                    div.style.cssText = "padding:8px;border-radius:12px;cursor:pointer;margin-bottom:6px;transition:all0.2s";
                    div.innerHTML = `<i class="fas fa-comment"></i> ${s.title}<br><small>${new Date(s.updated).toLocaleString("ar-SA")}</small>`;
                    div.addEventListener("click", () => {
                        sessionId = s.id;
                        localStorage.setItem(LS_SESSION_KEY, sessionId);
                        if (sessionIndicator) sessionIndicator.innerHTML = `<i class="fas fa-id-card"></i> جلسة: ${sessionId.slice(0, 8)}`;
                        loadLocalHistory();
                        showToast("تم فتح الجلسة", "success");
                    });
                    div.addEventListener("mouseenter", () => div.style.background = "var(--glass)");
                    div.addEventListener("mouseleave", () => div.style.background = "transparent");
                    container.appendChild(div);
                });
            }

            function toggleWorkspace(force) {
                if (!workspacePanel) return;
                const visible = typeof force === "boolean" ? force : !workspacePanel.classList.contains("visible");
                workspacePanel.classList.toggle("visible", visible);
                if (visible) workspacePanel.classList.remove("hidden");
                else workspacePanel.classList.add("hidden");
            }

            // Event Setup
            function setupEvents() {
                sendBtn?.addEventListener("click", () => {
                    const text = userInput?.value.trim();
                    if (!text) return;
                    if (handleQuickCommand(text)) { if (userInput) userInput.value = ""; return; }
                    sendMessage(text);
                });
                userInput?.addEventListener("keydown", (e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();
                        const text = userInput.value.trim();
                        if (!text) return;
                        if (handleQuickCommand(text)) { userInput.value = ""; return; }
                        sendMessage(text);
                    }
                });
                fileInput?.addEventListener("change", e => { if (e.target.files[0]) uploadFile(e.target.files[0]); fileInput.value = ""; });
                hiddenAudioInput?.addEventListener("change", e => { if (e.target.files[0]) uploadAudio(e.target.files[0]); hiddenAudioInput.value = ""; });
                hiddenImageInput?.addEventListener("change", e => { if (e.target.files[0]) uploadImage(e.target.files[0]); hiddenImageInput.value = ""; });
                voiceBtn?.addEventListener("click", () => hiddenAudioInput?.click());
                visionBtn?.addEventListener("click", () => hiddenImageInput?.click());
                miniUploadBtn?.addEventListener("click", () => fileInput?.click());
                miniVoiceBtn?.addEventListener("click", () => hiddenAudioInput?.click());
                miniVisionBtn?.addEventListener("click", () => hiddenImageInput?.click());
                newSessionBtn?.addEventListener("click", createNewSession);
                toggleThemeBtn?.addEventListener("click", () => setTheme(!isDark));
                openSettingsBtn?.addEventListener("click", () => toggleSettings());
                openWorkspaceBtn?.addEventListener("click", () => toggleWorkspace());
                menuToggleBtn?.addEventListener("click", () => sidebar?.classList.toggle("open"));
                clearChatBtn?.addEventListener("click", clearChat);
                if (chatWindow) {
                    ["dragenter", "dragover"].forEach(ev => chatWindow.addEventListener(ev, e => { e.preventDefault(); chatWindow.classList.add("drag-over"); }));
                    ["dragleave", "drop"].forEach(ev => chatWindow.addEventListener(ev, e => { e.preventDefault(); chatWindow.classList.remove("drag-over"); if (ev === "drop" && e.dataTransfer.files[0]) { const f = e.dataTransfer.files[0]; if (f.type.startsWith("image/")) uploadImage(f); else if (f.type.startsWith("audio/")) uploadAudio(f); else uploadFile(f); } }));
                }
                setInterval(pingStatus, 30000);
            }

            // Initialize
            setSession(sessionId);
            renderSessionList();
            buildSettingsPanel();
            buildWorkspacePanel();
            loadLocalHistory();
            pingStatus();
            setupEvents();
            autoResizeTextarea(userInput);
        })();
    </script>
</body>
</html>
