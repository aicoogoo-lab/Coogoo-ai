<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>سماء • Sky AI - الرفيقة الذكية الحية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --accent: #c026d3;
      --accent-dark: #a21caf;
      --bg-dark: #0f0f1a;
      --bg-card: rgba(25, 25, 45, 0.85);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
      --glow-primary: 0 0 20px rgba(99, 102, 241, 0.5);
      --glow-accent: 0 0 20px rgba(192, 38, 211, 0.4);
    }

    body {
      font-family: 'Cairo', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    /* حاوية 3D */
    #three-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* واجهة التطبيق الرئيسية */
    .app-container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: rgba(15, 15, 26, 0.6);
      backdrop-filter: blur(10px);
    }

    /* الشريط العلوي */
    .top-bar {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(20, 20, 40, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* أفatar متحرك (شفتين) */
    .avatar-3d {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: var(--glow-primary);
    }

    .avatar-3d .mouth {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 4px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 4px;
      transition: all 0.1s ease;
    }

    .avatar-3d.speaking .mouth {
      width: 22px;
      height: 8px;
      border-radius: 4px 4px 8px 8px;
      animation: mouthMove 0.2s ease infinite alternate;
    }

    @keyframes mouthMove {
      from { height: 4px; width: 16px; }
      to { height: 10px; width: 24px; }
    }

    .avatar-3d .eyes {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .title h1 {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(90deg, #a5b4fc, #c084fc, #f0abfc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse-green 2s infinite;
    }

    @keyframes pulse-green {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); background: #34d399; }
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .icon-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border);
      width: 40px;
      height: 40px;
      border-radius: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .icon-btn:hover, .icon-btn:active {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }

    /* شريط المحادثات الجانبي */
    .sidebar {
      position: fixed;
      right: -320px;
      top: 0;
      width: 300px;
      height: 100vh;
      background: rgba(15, 15, 30, 0.95);
      backdrop-filter: blur(20px);
      border-left: 1px solid var(--border);
      z-index: 100;
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
      padding: 60px 16px 20px;
    }

    .sidebar.open {
      right: 0;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
    }

    .conv-item {
      padding: 12px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .conv-item.active {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(192, 38, 211, 0.2));
      border-right: 3px solid var(--primary);
    }

    .conv-title {
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-date {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* منطقة الشات */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }

    .messages-area::-webkit-scrollbar {
      width: 4px;
    }

    .messages-area::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    .messages-area::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }

    .message {
      max-width: 85%;
      margin-bottom: 16px;
      animation: messageSlide 0.3s ease;
      position: relative;
    }

    @keyframes messageSlide {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      margin-right: auto;
    }

    .message.assistant {
      margin-left: auto;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 20px;
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .user .bubble {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border-bottom-right-radius: 4px;
    }

    .assistant .bubble {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message-time {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .copy-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.7rem;
    }

    /* مؤشر الكتابة الذكي */
    .typing-brain {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      width: fit-content;
      margin-bottom: 16px;
    }

    .brain-wave {
      width: 4px;
      height: 20px;
      background: var(--primary);
      border-radius: 2px;
      animation: brainWave 0.8s ease infinite alternate;
    }

    .brain-wave:nth-child(2) { animation-delay: 0.2s; height: 12px; }
    .brain-wave:nth-child(3) { animation-delay: 0.4s; height: 28px; }
    .brain-wave:nth-child(4) { animation-delay: 0.6s; height: 8px; }
    .brain-wave:nth-child(5) { animation-delay: 0.8s; height: 18px; }

    @keyframes brainWave {
      from { height: 8px; opacity: 0.4; }
      to { height: 24px; opacity: 1; }
    }

    /* أزرار التنقل */
    .nav-buttons {
      position: fixed;
      bottom: 100px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 50;
    }

    .nav-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.9);
      backdrop-filter: blur(10px);
      border: none;
      color: white;
      cursor: pointer;
      box-shadow: var(--glow-primary);
      transition: all 0.2s ease;
    }

    .nav-btn:active {
      transform: scale(0.9);
    }

    .nav-btn.hidden {
      display: none;
    }

    /* شريط الإدخال */
    .input-area {
      padding: 16px 20px 24px;
      background: rgba(20, 20, 40, 0.8);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 32px;
      padding: 6px 6px 6px 16px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .input-wrapper:focus-within {
      border-color: var(--primary);
      box-shadow: var(--glow-primary);
    }

    #messageInput {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem;
      padding: 12px 0;
      outline: none;
    }

    #messageInput::placeholder {
      color: var(--text-muted);
    }

    .attach-btn, .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .attach-btn {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
    }

    .send-btn {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      box-shadow: var(--glow-primary);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .file-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .file-chip {
      background: rgba(255, 255, 255, 0.08);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .file-chip button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
    }

    /* تأثيرات عاطفية */
    .heart-effect {
      position: fixed;
      pointer-events: none;
      font-size: 24px;
      animation: floatUp 1s ease-out forwards;
      z-index: 200;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 768px) {
      .message {
        max-width: 90%;
      }
      .sidebar {
        width: 85%;
        right: -85%;
      }
    }
  </style>
</head>
<body>

<div id="three-container"></div>

<div class="app-container">
  <div class="top-bar">
    <div class="brand">
      <div class="avatar-3d" id="avatar3d">
        <div class="mouth"></div>
      </div>
      <div class="title">
        <h1>سماء</h1>
        <div class="status-badge">
          <span class="status-dot"></span>
          <span id="statusText">متصلة</span>
        </div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="historyBtn"><i class="fas fa-history"></i></button>
      <button class="icon-btn" id="themeBtn"><i class="fas fa-moon"></i></button>
      <button class="icon-btn" id="clearBtn"><i class="fas fa-trash-alt"></i></button>
    </div>
  </div>

  <div class="chat-container">
    <div class="messages-area" id="messagesArea">
      <div id="messagesList"></div>
      <div id="typingBrain" class="typing-brain hidden">
        <span>سماء تفكر</span>
        <div class="brain-wave"></div>
        <div class="brain-wave"></div>
        <div class="brain-wave"></div>
        <div class="brain-wave"></div>
        <div class="brain-wave"></div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <button class="attach-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
      <input type="text" id="messageInput" placeholder="اكتب لسماء..." autocomplete="off">
      <input type="file" id="fileInput" multiple style="display: none;">
      <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
    <div id="filePreview" class="file-preview"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>المحادثات السابقة</h3>
    <button class="icon-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
  </div>
  <div class="conversation-list" id="convList"></div>
</div>

<div class="nav-buttons" id="navButtons">
  <button class="nav-btn hidden" id="scrollUpBtn"><i class="fas fa-arrow-up"></i></button>
  <button class="nav-btn hidden" id="scrollDownBtn"><i class="fas fa-arrow-down"></i></button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  // ============================================
  // نظام الواجهة الذكية الحية الكامل
  // ============================================

  (function() {
    // ---------- خلفية Three.js السائلة الذكية ----------
    let scene, camera, renderer, geometry, material, mesh;
    
    function initThree() {
      const container = document.getElementById('three-container');
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x0f0f1a, 1);
      container.appendChild(renderer.domElement);
      
      // خلفية موجية سائلة ذكية
      geometry = new THREE.SphereGeometry(1.5, 64, 64);
      material = new THREE.MeshStandardMaterial({
        color: 0x6366f1,
        emissive: 0x1a1a3a,
        roughness: 0.3,
        metalness: 0.7,
        wireframe: false
      });
      mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);
      
      // إضاءة ديناميكية
      const light = new THREE.PointLight(0x6366f1, 1);
      light.position.set(2, 2, 2);
      scene.add(light);
      const ambientLight = new THREE.AmbientLight(0x404060);
      scene.add(ambientLight);
      
      camera.position.z = 3;
      
      let time = 0;
      function animate() {
        requestAnimationFrame(animate);
        time += 0.01;
        mesh.rotation.x = Math.sin(time * 0.3) * 0.3;
        mesh.rotation.y = time * 0.2;
        mesh.rotation.z = Math.cos(time * 0.2) * 0.1;
        const scale = 1 + Math.sin(time * 0.8) * 0.05;
        mesh.scale.set(scale, scale, scale);
        renderer.render(scene, camera);
      }
      animate();
      
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }
    
    initThree();
    
    // ---------- إدارة المحادثات والأرشفة ----------
    let conversations = JSON.parse(localStorage.getItem('sky_conversations')) || [];
    let currentConvId = localStorage.getItem('sky_current_conv') || null;
    let currentMessages = [];
    let selectedFiles = [];
    
    function saveConversations() {
      localStorage.setItem('sky_conversations', JSON.stringify(conversations));
    }
    
    function saveCurrentConv() {
      if (currentConvId) {
        const index = conversations.findIndex(c => c.id === currentConvId);
        if (index !== -1) {
          conversations[index].messages = currentMessages;
          conversations[index].updatedAt = Date.now();
          if (conversations[index].title === 'محادثة جديدة' && currentMessages.length > 0) {
            const firstUserMsg = currentMessages.find(m => m.sender === 'user');
            if (firstUserMsg) {
              conversations[index].title = firstUserMsg.content.substring(0, 30) + (firstUserMsg.content.length > 30 ? '...' : '');
            }
          }
        } else {
          conversations.push({
            id: currentConvId,
            title: 'محادثة جديدة',
            messages: currentMessages,
            createdAt: Date.now(),
            updatedAt: Date.now()
          });
        }
        saveConversations();
      }
    }
    
    function loadConversation(convId) {
      const conv = conversations.find(c => c.id === convId);
      if (conv) {
        currentConvId = conv.id;
        currentMessages = [...conv.messages];
        localStorage.setItem('sky_current_conv', currentConvId);
        renderMessages();
        saveCurrentConv();
        scrollToBottom();
      }
    }
    
    function newConversation() {
      currentConvId = 'conv_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
      currentMessages = [];
      localStorage.setItem('sky_current_conv', currentConvId);
      renderMessages();
      if (currentMessages.length === 0) {
        setTimeout(() => {
          addMessageToUI('assistant', 'مرحباً بك... أنا سماء. كيف حالك اليوم؟ ✨');
          currentMessages.push({ sender: 'assistant', content: 'مرحباً بك... أنا سماء. كيف حالك اليوم؟ ✨', time: Date.now() });
          saveCurrentConv();
        }, 300);
      }
    }
    
    function renderMessages() {
      const container = document.getElementById('messagesList');
      if (!container) return;
      container.innerHTML = '';
      currentMessages.forEach(msg => {
        addMessageToUI(msg.sender, msg.content, msg.time);
      });
      updateConversationList();
    }
    
    function addMessageToUI(sender, content, timestamp = Date.now()) {
      const container = document.getElementById('messagesList');
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender}`;
      const timeStr = new Date(timestamp).toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
      msgDiv.innerHTML = `
        <div class="bubble">${content.replace(/\n/g, '<br>')}</div>
        <div class="message-time">
          <span>${timeStr}</span>
          <button class="copy-btn" onclick="navigator.clipboard.writeText('${content.replace(/'/g, "\\'")}')"><i class="fas fa-copy"></i></button>
        </div>
      `;
      container.appendChild(msgDiv);
      
      // تأثير قلوب عند كلمة شكر
      if (content.includes('شكر') || content.includes('❤') || content.includes('♥')) {
        createHeartEffect();
      }
      
      scrollToBottomIfNeeded();
    }
    
    function createHeartEffect() {
      for (let i = 0; i < 10; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart-effect';
        heart.innerHTML = ['❤️', '💖', '✨', '🌟'][Math.floor(Math.random() * 4)];
        heart.style.left = Math.random() * window.innerWidth + 'px';
        heart.style.bottom = '50px';
        heart.style.position = 'fixed';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
      }
    }
    
    function updateConversationList() {
      const list = document.getElementById('convList');
      if (!list) return;
      list.innerHTML = '';
      conversations.sort((a, b) => b.updatedAt - a.updatedAt);
      conversations.forEach(conv => {
        const item = document.createElement('div');
        item.className = `conv-item ${conv.id === currentConvId ? 'active' : ''}`;
        item.innerHTML = `
          <div class="conv-title">${conv.title}</div>
          <div class="conv-date">${new Date(conv.updatedAt).toLocaleDateString('ar')}</div>
        `;
        item.onclick = () => {
          loadConversation(conv.id);
          document.getElementById('sidebar').classList.remove('open');
        };
        list.appendChild(item);
      });
    }
    
    // ---------- التنقل الذكي ----------
    const messagesArea = document.getElementById('messagesArea');
    const scrollUpBtn = document.getElementById('scrollUpBtn');
    const scrollDownBtn = document.getElementById('scrollDownBtn');
    
    function scrollToBottom() {
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    function scrollToTop() {
      messagesArea.scrollTop = 0;
    }
    
    function scrollToBottomIfNeeded() {
      const isNearBottom = messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight < 100;
      if (isNearBottom) scrollToBottom();
    }
    
    function updateNavButtons() {
      if (!scrollUpBtn || !scrollDownBtn) return;
      const scrollTop = messagesArea.scrollTop;
      const maxScroll = messagesArea.scrollHeight - messagesArea.clientHeight;
      if (scrollTop > 100) {
        scrollUpBtn.classList.remove('hidden');
      } else {
        scrollUpBtn.classList.add('hidden');
      }
      if (maxScroll - scrollTop > 100) {
        scrollDownBtn.classList.remove('hidden');
      } else {
        scrollDownBtn.classList.add('hidden');
      }
    }
    
    messagesArea.addEventListener('scroll', updateNavButtons);
    scrollUpBtn.onclick = scrollToTop;
    scrollDownBtn.onclick = scrollToBottom;
    
    // ---------- عين السماء ومؤشر الكتابة الذكي ----------
    const avatar3d = document.getElementById('avatar3d');
    const typingBrain = document.getElementById('typingBrain');
    const statusText = document.getElementById('statusText');
    
    function startTyping() {
      typingBrain.classList.remove('hidden');
      avatar3d.classList.add('speaking');
      statusText.innerText = 'تفكر';
      scrollToBottomIfNeeded();
    }
    
    function stopTyping() {
      typingBrain.classList.add('hidden');
      avatar3d.classList.remove('speaking');
      statusText.innerText = 'متصلة';
    }
    
    // ---------- إرسال الرسائل ----------
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const filePreview = document.getElementById('filePreview');
    
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text && selectedFiles.length === 0) return;
      
      if (text) {
        addMessageToUI('user', text);
        currentMessages.push({ sender: 'user', content: text, time: Date.now() });
        messageInput.value = '';
      }
      
      // رفع الملفات
      for (let file of selectedFiles) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('session_id', currentConvId);
        try {
          await fetch('/upload', { method: 'POST', body: formData });
          addMessageToUI('assistant', `تم استلام ملف: ${file.name}`);
          currentMessages.push({ sender: 'assistant', content: `تم استلام ملف: ${file.name}`, time: Date.now() });
        } catch(e) {
          addMessageToUI('assistant', 'فشل رفع الملف');
          currentMessages.push({ sender: 'assistant', content: 'فشل رفع الملف', time: Date.now() });
        }
      }
      selectedFiles = [];
      filePreview.innerHTML = '';
      
      if (!text) {
        saveCurrentConv();
        return;
      }
      
      saveCurrentConv();
      startTyping();
      
      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: currentConvId })
        });
        const data = await res.json();
        stopTyping();
        if (data.reply) {
          addMessageToUI('assistant', data.reply);
          currentMessages.push({ sender: 'assistant', content: data.reply, time: Date.now() });
          saveCurrentConv();
        }
      } catch(error) {
        stopTyping();
        addMessageToUI('assistant', 'حدث خطأ في الاتصال. حاول مرة أخرى.');
        currentMessages.push({ sender: 'assistant', content: 'حدث خطأ في الاتصال. حاول مرة أخرى.', time: Date.now() });
        saveCurrentConv();
      }
    }
    
    function handleFileSelect() {
      const files = Array.from(fileInput.files);
      selectedFiles = [...selectedFiles, ...files];
      renderFilePreviews();
      fileInput.value = '';
    }
    
    function renderFilePreviews() {
      filePreview.innerHTML = '';
      selectedFiles.forEach((file, idx) => {
        const chip = document.createElement('div');
        chip.className = 'file-chip';
        chip.innerHTML = `
          <i class="fas fa-file"></i>
          <span>${file.name.substring(0, 20)}</span>
          <button onclick="window.removeFile(${idx})">×</button>
        `;
        filePreview.appendChild(chip);
      });
    }
    
    window.removeFile = (idx) => {
      selectedFiles.splice(idx, 1);
      renderFilePreviews();
    };
    
    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    attachBtn.onclick = () => fileInput.click();
    fileInput.onchange = handleFileSelect;
    
    // ---------- التحكم بالواجهة الجانبية ----------
    const historyBtn = document.getElementById('historyBtn');
    const sidebar = document.getElementById('sidebar');
    const closeSidebar = document.getElementById('closeSidebar');
    historyBtn.onclick = () => sidebar.classList.add('open');
    closeSidebar.onclick = () => sidebar.classList.remove('open');
    
    // ---------- مسح المحادثة ----------
    const clearBtn = document.getElementById('clearBtn');
    clearBtn.onclick = () => {
      if (confirm('هل تريد مسح المحادثة الحالية؟')) {
        currentMessages = [];
        renderMessages();
        saveCurrentConv();
        addMessageToUI('assistant', 'تم مسح المحادثة. كيف يمكنني مساعدتك؟');
        currentMessages.push({ sender: 'assistant', content: 'تم مسح المحادثة. كيف يمكنني مساعدتك؟', time: Date.now() });
        saveCurrentConv();
      }
    };
    
    // ---------- الوضع الليلي/النهاري ----------
    let isDark = true;
    const themeBtn = document.getElementById('themeBtn');
    themeBtn.onclick = () => {
      isDark = !isDark;
      document.body.style.background = isDark ? '#0f0f1a' : '#f0f0f5';
      themeBtn.innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    };
    
    // ---------- إعادة تحميل آخر محادثة ----------
    if (currentConvId && conversations.find(c => c.id === currentConvId)) {
      loadConversation(currentConvId);
    } else {
      newConversation();
    }
    
    updateConversationList();
  })();
</script>
</body>
</html>
