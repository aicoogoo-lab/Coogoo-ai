<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>سماء | محادثة ذكية</title>
  
  <!-- Three.js لتأثيرات بصرية خفيفة (اختياري، يمكن إلغاؤه) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/static/css/core.css">
  
  <style>
    /* تأثيرات إضافية سريعة */
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    
    /* زر الثيم المؤقت (سيظهر تلقائياً) */
    .theme-temp-btn {
      background: rgba(255,255,255,0.08);
      border-radius: 30px;
      padding: 6px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .theme-temp-btn:hover {
      background: rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="app-header">
    <div class="header-left">
      <button class="icon-btn" id="menu-toggle" aria-label="القائمة">
        <i class="fas fa-bars"></i>
      </button>
      <div class="logo">
        <span class="logo-icon">🌙</span>
        <span class="logo-text">سماء</span>
      </div>
    </div>
    <div class="header-right">
      <div class="theme-temp-btn" id="theme-toggle" title="تبديل الثيم">
        <i class="fas fa-palette"></i> <span id="theme-name">داكن</span>
      </div>
      <button class="icon-btn" id="new-session-header" title="جلسة جديدة">
        <i class="fas fa-plus"></i>
      </button>
    </div>
  </div>

  <!-- Main Layout -->
  <div class="app-main">
    
    <!-- Sidebar (جلسات) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-session-btn" id="new-session-btn">
          <i class="fas fa-plus"></i> محادثة جديدة
        </button>
      </div>
      <div class="sessions-list" id="session-list">
        <!-- ستظهر الجلسات هنا -->
      </div>
      <div class="sidebar-footer">
        <div class="memory-badge">
          <i class="fas fa-brain"></i> <span id="memory-count">128</span> ذاكرة
        </div>
      </div>
    </aside>

    <!-- Chat Area -->
    <div class="chat-area">
      
      <!-- منطقة الرسائل -->
      <div class="messages-container" id="messages-container">
        <div class="messages-list" id="messages-list">
          <!-- رسالة ترحيب -->
          <div class="message assistant">
            <div class="message-avatar"><i class="fas fa-sparkles"></i></div>
            <div class="message-bubble">
              <div class="message-text">مرحباً بك في سماء. كيف يمكنني مساعدتك اليوم؟</div>
              <div class="message-time">الآن</div>
            </div>
          </div>
        </div>
      </div>

      <!-- منطقة الإدخال -->
      <div class="input-area">
        <div class="image-preview-area" id="image-preview-area" style="display: none;">
          <div class="image-preview">
            <img id="preview-img" src="" alt="معاينة">
            <button class="remove-preview" id="remove-preview"><i class="fas fa-times"></i></button>
          </div>
        </div>
        <div class="input-wrapper">
          <button class="input-action" id="upload-btn" title="رفع صورة">
            <i class="fas fa-image"></i>
          </button>
          <textarea id="message-input" placeholder="اكتب رسالتك..." rows="1"></textarea>
          <button class="input-action" id="voice-btn" title="إدخال صوتي">
            <i class="fas fa-microphone"></i>
          </button>
          <button class="send-btn" id="send-btn">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
      
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script>
    window.SKY_CONFIG = {
      useMockAPI: true,
      version: "2.0"
    };
  </script>
  
  <script src="/static/js/ui.js"></script>
  <script src="/static/js/core.js"></script>
  
  <script>
    // تهيئة بسيطة
    document.addEventListener('DOMContentLoaded', () => {
      if (window.SkyCore) SkyCore.init();
    });
  </script>
</body>
</html>
