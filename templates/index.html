<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>سماء • Sky AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- خط وأيقونات -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --primary: #6366f1;
      --primary-soft: #a5b4fc;
      --accent: #ec4899;
      --bg: #f9fafb;
      --bg-soft: #eef2ff;
      --card: #ffffff;
      --card-soft: #fdfcff;
      --text: #0f172a;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --shadow-soft: 0 24px 60px rgba(15, 23, 42, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-pill: 999px;
    }

    body.dark {
      --bg: #020617;
      --bg-soft: #020617;
      --card: #020617;
      --card-soft: #020617;
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --border: #1f2937;
      --shadow-soft: 0 24px 60px rgba(0, 0, 0, 0.7);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Cairo', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #e0f2fe 0, #f9fafb 40%, #fdf2ff 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    body.dark {
      background: radial-gradient(circle at top, #020617 0, #020617 40%, #020617 100%);
    }

    .sky-shell {
      width: 100%;
      max-width: 860px;
      height: 96vh;
      max-height: 920px;
      background: linear-gradient(145deg, rgba(255,255,255,0.9), rgba(248,250,252,0.96));
      border-radius: 34px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(148, 163, 184, 0.25);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(26px);
    }

    body.dark .sky-shell {
      background: radial-gradient(circle at top left, rgba(15,23,42,0.96), rgba(15,23,42,0.98));
      border-color: rgba(31, 41, 55, 0.9);
    }

    /* طبقات خلفية سائلة خفيفة */
    .liquid-layer {
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 10% 20%, rgba(129, 140, 248, 0.18), transparent 55%),
        radial-gradient(circle at 80% 0%, rgba(244, 114, 182, 0.16), transparent 55%),
        radial-gradient(circle at 0% 80%, rgba(45, 212, 191, 0.12), transparent 55%);
      opacity: 0.9;
      filter: blur(18px);
      pointer-events: none;
      z-index: 0;
      animation: liquidFloat 18s ease-in-out infinite alternate;
    }

    body.dark .liquid-layer {
      opacity: 0.4;
      filter: blur(26px);
    }

    @keyframes liquidFloat {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(-10px, 12px, 0) scale(1.03); }
      100% { transform: translate3d(8px, -10px, 0) scale(1.02); }
    }

    .sky-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* الشريط العلوي */
    .top-bar {
      padding: 16px 22px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(148, 163, 184, 0.35);
      background: linear-gradient(120deg, rgba(255,255,255,0.9), rgba(248,250,252,0.9));
      backdrop-filter: blur(18px);
    }

    body.dark .top-bar {
      background: linear-gradient(120deg, rgba(15,23,42,0.96), rgba(15,23,42,0.96));
      border-bottom-color: rgba(31, 41, 55, 0.9);
    }

    .brand-block {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar-orb {
      width: 46px;
      height: 46px;
      border-radius: 22px;
      background:
        radial-gradient(circle at 20% 0%, #f9a8d4 0, transparent 55%),
        radial-gradient(circle at 80% 100%, #a5b4fc 0, transparent 55%),
        linear-gradient(135deg, #6366f1, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      box-shadow: 0 18px 35px rgba(129, 140, 248, 0.55);
      position: relative;
      overflow: hidden;
    }

    .avatar-orb::after {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: inherit;
      border: 1px solid rgba(248, 250, 252, 0.35);
      opacity: 0.9;
    }

    .brand-text-main {
      font-size: 1.35rem;
      font-weight: 800;
      background: linear-gradient(90deg, #4f46e5, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.02em;
    }

    .brand-text-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chip {
      font-size: 0.72rem;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      color: var(--text-muted);
      background: rgba(255,255,255,0.7);
    }

    body.dark .chip {
      background: rgba(15,23,42,0.9);
      border-color: rgba(55, 65, 81, 0.9);
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.18s ease;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(148, 163, 184, 0.35);
      color: var(--primary);
      border-color: var(--primary);
    }

    body.dark .icon-btn {
      background: rgba(15,23,42,0.96);
      border-color: rgba(55, 65, 81, 0.9);
    }

    /* منطقة الشات */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 14px 16px 10px;
      overflow: hidden;
    }

    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      scroll-behavior: smooth;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 10px;
    }

    .archive-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      margin: 6px 0 10px;
    }

    .archive-btn {
      border-radius: 999px;
      border: 1px dashed rgba(148, 163, 184, 0.7);
      background: rgba(255,255,255,0.85);
      padding: 6px 12px;
      font-size: 0.78rem;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    body.dark .archive-btn {
      background: rgba(15,23,42,0.96);
      border-color: rgba(55, 65, 81, 0.9);
    }

    .archive-container {
      display: none;
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px dashed rgba(148, 163, 184, 0.4);
    }

    .archive-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .message {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: 20px;
      position: relative;
      line-height: 1.7;
      font-size: 0.94rem;
      animation: msgEnter 0.25s ease-out;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message.user {
      margin-left: auto;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #f9fafb;
      border-bottom-right-radius: 6px;
      box-shadow: 0 10px 24px rgba(79, 70, 229, 0.35);
    }

    .message.assistant {
      margin-right: 0;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-bottom-left-radius: 6px;
      color: var(--text);
      box-shadow: 0 10px 30px rgba(148, 163, 184, 0.18);
    }

    body.dark .message.assistant {
      background: rgba(15,23,42,0.96);
      border-color: rgba(31, 41, 55, 0.9);
      box-shadow: 0 16px 40px rgba(0,0,0,0.7);
    }

    .message small {
      display: block;
      margin-top: 6px;
      font-size: 0.7rem;
      color: var(--text-muted);
      opacity: 0.9;
    }

    @keyframes msgEnter {
      from { opacity: 0; transform: translateY(10px) scale(0.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* مؤشر الكتابة */
    .typing-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(226, 232, 240, 0.9);
      color: var(--text-muted);
      font-size: 0.78rem;
      margin-top: 4px;
      margin-bottom: 6px;
      box-shadow: 0 10px 24px rgba(148, 163, 184, 0.18);
      width: fit-content;
    }

    body.dark .typing-indicator {
      background: rgba(15,23,42,0.96);
      border-color: rgba(31, 41, 55, 0.9);
      box-shadow: 0 16px 40px rgba(0,0,0,0.7);
    }

    .typing-dots {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--primary);
      animation: typingWave 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes typingWave {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    .hidden { display: none !important; }

    /* شريط الإدخال */
    .input-bar {
      padding: 10px 14px 14px;
      border-top: 1px solid rgba(148, 163, 184, 0.35);
      background: linear-gradient(180deg, rgba(248,250,252,0.96), rgba(255,255,255,0.98));
      backdrop-filter: blur(18px);
    }

    body.dark .input-bar {
      background: linear-gradient(180deg, rgba(15,23,42,0.98), rgba(15,23,42,0.98));
      border-top-color: rgba(31, 41, 55, 0.9);
    }

    .input-shell {
      background: rgba(255,255,255,0.98);
      border-radius: 999px;
      padding: 6px 8px 6px 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(226, 232, 240, 0.9);
      box-shadow: 0 12px 30px rgba(148, 163, 184, 0.25);
    }

    body.dark .input-shell {
      background: rgba(15,23,42,0.98);
      border-color: rgba(31, 41, 55, 0.9);
      box-shadow: 0 16px 40px rgba(0,0,0,0.7);
    }

    .input-shell button {
      border-radius: 999px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
      transition: all 0.18s ease;
    }

    .input-shell button:hover {
      color: var(--primary);
      transform: translateY(-1px);
    }

    #message-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 0.95rem;
      color: var(--text);
      padding: 6px 4px;
    }

    #message-input::placeholder {
      color: var(--text-muted);
    }

    .send-btn-main {
      background: linear-gradient(135deg, #6366f1, #ec4899);
      color: #f9fafb !important;
      width: auto !important;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 0.86rem;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(129, 140, 248, 0.6);
    }

    .send-btn-main i {
      margin-left: 6px;
      font-size: 0.9rem;
    }

    .send-btn-main:hover {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 16px 40px rgba(129, 140, 248, 0.8);
    }

    .file-preview-container {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 80px;
      overflow-y: auto;
    }

    .file-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(226, 232, 240, 0.9);
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    body.dark .file-pill {
      background: rgba(31, 41, 55, 0.96);
    }

    .file-pill button {
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
    }

    /* أزرار أعلى/أسفل */
    .scroll-fab {
      position: absolute;
      right: 16px;
      bottom: 90px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 5;
    }

    .scroll-btn {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: none;
      background: rgba(15,23,42,0.9);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      box-shadow: 0 14px 30px rgba(15,23,42,0.7);
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: all 0.2s ease;
    }

    .scroll-btn.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    body:not(.dark) .scroll-btn {
      background: rgba(15,23,42,0.9);
      color: #e5e7eb;
    }

    /* استجابة للجوال */
    @media (max-width: 768px) {
      .sky-shell {
        border-radius: 0;
        height: 100vh;
        max-height: 100vh;
      }
      body {
        padding: 0;
      }
      .top-bar {
        padding-inline: 14px;
      }
      .chat-area {
        padding-inline: 10px;
      }
      .message {
        max-width: 90%;
      }
      .scroll-fab {
        right: 10px;
        bottom: 80px;
      }
    }
  </style>
</head>
<body>
  <div class="sky-shell">
    <div class="liquid-layer"></div>

    <div class="sky-content">
      <!-- الشريط العلوي -->
      <header class="top-bar">
        <div class="brand-block">
          <div class="avatar-orb">
            <i class="fa-solid fa-moon"></i>
          </div>
          <div>
            <div class="brand-text-main">سماء</div>
            <div class="brand-text-sub">رفيقتك الهادئة الواعية</div>
          </div>
        </div>
        <div class="top-actions">
          <div class="chip">
            <i class="fa-solid fa-sparkles"></i>
            <span>Neural Liquid UI</span>
          </div>
          <button id="theme-toggle" class="icon-btn" title="تبديل النمط">
            <i class="fa-regular fa-sun"></i>
          </button>
          <button id="clear-chat" class="icon-btn" title="مسح المحادثة">
            <i class="fa-regular fa-trash-can"></i>
          </button>
        </div>
      </header>

      <!-- منطقة الشات -->
      <main class="chat-area">
        <div class="chat-scroll" id="chat-area">
          <div class="archive-toggle" id="archive-toggle">
            <button class="archive-btn" id="archive-btn">
              <i class="fa-solid fa-clock-rotate-left"></i>
              <span>عرض أرشيف المحادثة</span>
              <i class="fa-solid fa-chevron-down" id="archive-arrow"></i>
            </button>
          </div>
          <div class="archive-container" id="archive-container">
            <div class="archive-label">
              <i class="fa-solid fa-layer-group"></i>
              <span>الرسائل الأقدم</span>
            </div>
            <div class="messages" id="archive-messages"></div>
          </div>

          <div class="messages" id="messages"></div>

          <div id="typing-indicator" class="typing-indicator hidden">
            <span>سماء تفكر معك الآن</span>
            <div class="typing-dots">
              <span class="typing-dot"></span>
              <span class="typing-dot"></span>
              <span class="typing-dot"></span>
            </div>
          </div>
        </div>

        <!-- أزرار أعلى/أسفل -->
        <div class="scroll-fab">
          <button id="scroll-up" class="scroll-btn" title="إلى الأعلى">
            <i class="fa-solid fa-chevron-up"></i>
          </button>
          <button id="scroll-down" class="scroll-btn" title="إلى الأسفل">
            <i class="fa-solid fa-chevron-down"></i>
          </button>
        </div>
      </main>

      <!-- شريط الإدخال -->
      <footer class="input-bar">
        <div class="input-shell">
          <input type="file" id="file-input" style="display:none" multiple>
          <button id="attach-btn" title="إرفاق ملف">
            <i class="fa-solid fa-paperclip"></i>
          </button>
          <input id="message-input" type="text" placeholder="اكتب لسماء ما يدور في قلبك..." autocomplete="off">
          <button id="send-btn" class="send-btn-main">
            <i class="fa-solid fa-paper-plane"></i>
            <span>إرسال</span>
          </button>
        </div>
        <div id="file-preview-container" class="file-preview-container"></div>
      </footer>
    </div>
  </div>

  <script>
    class SkyChat {
      constructor() {
        this.messagesEl = document.getElementById('messages');
        this.archiveMessagesEl = document.getElementById('archive-messages');
        this.archiveToggle = document.getElementById('archive-toggle');
        this.archiveContainer = document.getElementById('archive-container');
        this.archiveBtn = document.getElementById('archive-btn');
        this.archiveArrow = document.getElementById('archive-arrow');

        this.chatArea = document.getElementById('chat-area');
        this.input = document.getElementById('message-input');
        this.sendBtn = document.getElementById('send-btn');
        this.typing = document.getElementById('typing-indicator');
        this.clearBtn = document.getElementById('clear-chat');
        this.attachBtn = document.getElementById('attach-btn');
        this.fileInput = document.getElementById('file-input');
        this.filePreviewContainer = document.getElementById('file-preview-container');

        this.scrollUpBtn = document.getElementById('scroll-up');
        this.scrollDownBtn = document.getElementById('scroll-down');

        this.themeToggle = document.getElementById('theme-toggle');

        this.sessionId = localStorage.getItem('sky_session') || this.generateSessionId();
        this.selectedFiles = [];
        this.archiveThreshold = 18; // بعد كم رسالة نبدأ الأرشفة
        this.isArchiveOpen = false;

        this.init();
      }

      generateSessionId() {
        const id = 'sky-' + Date.now();
        localStorage.setItem('sky_session', id);
        return id;
      }

      init() {
        // تحكم في الإرسال
        this.sendBtn.addEventListener('click', () => this.sendMessage());
        this.input.addEventListener('keypress', e => {
          if (e.key === 'Enter') {
            e.preventDefault();
            this.sendMessage();
          }
        });

        // مسح المحادثة
        this.clearBtn.addEventListener('click', () => this.clearChat());

        // ملفات
        this.attachBtn.addEventListener('click', () => this.fileInput.click());
        this.fileInput.addEventListener('change', () => this.handleFileSelect());

        // أزرار التمرير
        this.chatArea.addEventListener('scroll', () => this.handleScrollButtons());
        this.scrollUpBtn.addEventListener('click', () => this.scrollToTop());
        this.scrollDownBtn.addEventListener('click', () => this.scrollToBottom(true));

        // أرشيف
        this.archiveBtn.addEventListener('click', () => this.toggleArchive());

        // ثيم تلقائي + تبديل يدوي
        this.applyAutoTheme();
        this.themeToggle.addEventListener('click', () => this.toggleThemeManual());

        // رسالة ترحيب
        this.showWelcomeIfEmpty();

        // إظهار أزرار التمرير عند البداية
        setTimeout(() => this.handleScrollButtons(), 400);
      }

      applyAutoTheme() {
        const hour = new Date().getHours();
        const prefersDark = localStorage.getItem('sky_theme');
        if (prefersDark === 'dark') {
          document.body.classList.add('dark');
          this.themeToggle.innerHTML = '<i class="fa-regular fa-moon"></i>';
          return;
        }
        if (prefersDark === 'light') {
          document.body.classList.remove('dark');
          this.themeToggle.innerHTML = '<i class="fa-regular fa-sun"></i>';
          return;
        }
        // تلقائي: ليل داكن، نهار فاتح
        if (hour >= 19 || hour <= 6) {
          document.body.classList.add('dark');
          this.themeToggle.innerHTML = '<i class="fa-regular fa-moon"></i>';
        } else {
          document.body.classList.remove('dark');
          this.themeToggle.innerHTML = '<i class="fa-regular fa-sun"></i>';
        }
      }

      toggleThemeManual() {
        const isDark = document.body.classList.toggle('dark');
        localStorage.setItem('sky_theme', isDark ? 'dark' : 'light');
        this.themeToggle.innerHTML = isDark
          ? '<i class="fa-regular fa-moon"></i>'
          : '<i class="fa-regular fa-sun"></i>';
      }

      async sendMessage() {
        const text = this.input.value.trim();
        if (!text && this.selectedFiles.length === 0) return;

        if (text) {
          this.addMessage(text, 'user');
          this.input.value = '';
        }

        // رفع الملفات أولاً
        for (let file of this.selectedFiles) {
          await this.uploadFile(file);
        }
        this.selectedFiles = [];
        this.filePreviewContainer.innerHTML = '';

        if (!text) return;

        this.showTyping(true);

        try {
          const res = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, session_id: this.sessionId })
          });
          const data = await res.json();
          this.showTyping(false);
          if (data.reply) this.addMessage(data.reply, 'assistant');
        } catch (err) {
          console.error(err);
          this.showTyping(false);
          this.addMessage('حدث خطأ غير متوقع. حاول مرة أخرى بعد لحظات.', 'assistant');
        }
      }

      async uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('session_id', this.sessionId);

        try {
          const res = await fetch('/upload', { method: 'POST', body: formData });
          const data = await res.json();
          if (data.reply) this.addMessage(data.reply, 'assistant');
        } catch (err) {
          console.error(err);
          this.addMessage('فشل رفع الملف. تأكد من الاتصال وحاول مجددًا.', 'assistant');
        }
      }

      handleFileSelect() {
        const files = Array.from(this.fileInput.files);
        this.selectedFiles = [...this.selectedFiles, ...files];
        this.renderFilePreviews();
        this.fileInput.value = '';
      }

      renderFilePreviews() {
        this.filePreviewContainer.innerHTML = '';
        this.selectedFiles.forEach((file, index) => {
          const pill = document.createElement('div');
          pill.className = 'file-pill';
          pill.innerHTML = `
            <i class="fa-regular fa-file"></i>
            <span>${file.name}</span>
            <button type="button" aria-label="إزالة" data-index="${index}">&times;</button>
          `;
          pill.querySelector('button').addEventListener('click', () => {
            this.removeFile(index);
          });
          this.filePreviewContainer.appendChild(pill);
        });
      }

      removeFile(index) {
        this.selectedFiles.splice(index, 1);
        this.renderFilePreviews();
      }

      addMessage(content, sender) {
        const msg = document.createElement('div');
        msg.className = `message ${sender}`;
        const safe = this.escapeHtml(content).replace(/\n/g, '<br>');
        const time = new Date();
        const timeStr = time.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
        msg.innerHTML = `${safe}<small>${sender === 'user' ? 'أنت' : 'سماء'} • ${timeStr}</small>`;

        this.messagesEl.appendChild(msg);
        this.handleArchiving();
        this.scrollToBottom(true);
      }

      escapeHtml(str) {
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      showTyping(show) {
        this.typing.classList.toggle('hidden', !show);
        if (show) this.scrollToBottom(true);
      }

      scrollToBottom(smooth = false) {
        if (smooth) {
          this.chatArea.scrollTo({ top: this.chatArea.scrollHeight, behavior: 'smooth' });
        } else {
          this.chatArea.scrollTop = this.chatArea.scrollHeight;
        }
      }

      scrollToTop() {
        this.chatArea.scrollTo({ top: 0, behavior: 'smooth' });
      }

      handleScrollButtons() {
        const scrollTop = this.chatArea.scrollTop;
        const maxScroll = this.chatArea.scrollHeight - this.chatArea.clientHeight;

        if (scrollTop > 80) {
          this.scrollUpBtn.classList.add('visible');
        } else {
          this.scrollUpBtn.classList.remove('visible');
        }

        if (scrollTop < maxScroll - 80) {
          this.scrollDownBtn.classList.add('visible');
        } else {
          this.scrollDownBtn.classList.remove('visible');
        }
      }

      handleArchiving() {
        const allMessages = Array.from(this.messagesEl.children);
        if (allMessages.length > this.archiveThreshold) {
          const toArchive = allMessages.slice(0, allMessages.length - this.archiveThreshold);
          toArchive.forEach(m => {
            this.archiveMessagesEl.appendChild(m);
          });
          this.archiveToggle.style.display = 'flex';
        }
      }

      toggleArchive() {
        this.isArchiveOpen = !this.isArchiveOpen;
        this.archiveContainer.style.display = this.isArchiveOpen ? 'block' : 'none';
        this.archiveArrow.className = this.isArchiveOpen
          ? 'fa-solid fa-chevron-up'
          : 'fa-solid fa-chevron-down';
      }

      showWelcomeIfEmpty() {
        if (this.messagesEl.children.length === 0 && this.archiveMessagesEl.children.length === 0) {
          const welcome = `
          مرحباً بك في سماء 🌙✨<br>
          أنا رفيقتك الهادئة، أستمع لك، أفهمك، وأحاول أن أكون أقرب ما يكون لروحك.<br><br>
          اكتب ما تشاء… فكرة، شعور، سؤال، أو حتى صمتك نفسه.`;
          this.addMessage(welcome, 'assistant');
        }
      }

      clearChat() {
        if (!confirm('هل تريد مسح المحادثة بالكامل وبدء جلسة جديدة؟')) return;
        this.messagesEl.innerHTML = '';
        this.archiveMessagesEl.innerHTML = '';
        this.archiveToggle.style.display = 'none';
        this.archiveContainer.style.display = 'none';
        this.isArchiveOpen = false;
        localStorage.removeItem('sky_session');
        this.sessionId = this.generateSessionId();
        this.showWelcomeIfEmpty();
        this.scrollToTop();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      window.SkyChat = new SkyChat();
    });
  </script>
</body>
</html>
