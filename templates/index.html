<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>سماء | SkyOS</title>

<style>
body {
    margin: 0;
    font-family: "Tahoma";
    background: linear-gradient(135deg, #0a0f1f, #05080f);
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* الهيدر */
header {
    background: #111827;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 2px solid #1f2937;
}

/* منطقة المحادثة */
#chatBox {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* الرسائل */
.message {
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    max-width: 70%;
}

.user {
    background: #1e40af;
    margin-left: auto;
}

.bot {
    background: #374151;
    margin-right: auto;
}

/* صندوق الإدخال */
#inputArea {
    display: flex;
    padding: 15px;
    border-top: 2px solid #1f2937;
}

#inputArea input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
    border-radius: 10px;
    font-size: 16px;
}

#inputArea button {
    margin-right: 10px;
    padding: 12px 20px;
    border: none;
    background: #10b981;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

#inputArea button:hover {
    background: #059669;
}

/* زر تسجيل الخروج */
.logout {
    position: absolute;
    top: 15px;
    left: 15px;
    background: red;
    padding: 8px 12px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
}
</style>
</head>

<body>

<a href="/logout" class="logout">تسجيل خروج</a>

<header>
🌌 سماء - SkyOS
</header>

<div id="chatBox">
    <div class="message bot">مرحبًا 👋 أنا سماء، اكتب أمرك.</div>
</div>

<div id="inputArea">
    <input id="messageInput" type="text" placeholder="اكتب أمرًا...">
    <button onclick="sendMessage()">إرسال</button>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    try {
        const response = await fetch("/command", {
            method: "POST",
            credentials: "include", // ✅ مهم للجلسات
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                command: text
            })
        });

        const data = await response.json();

        if (data.success === false) {
            addMessage("❌ خطأ: " + (data.error || "غير معروف"), "bot");
        } else {
            addMessage(formatResponse(data), "bot");
        }

    } catch (err) {
        addMessage("⚠️ فشل الاتصال بالخادم", "bot");
    }
}

/* عرض الرسائل */
function addMessage(text, type) {
    const chatBox = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

/* تنسيق الرد */
function formatResponse(data) {
    if (data.response) return data.response;
    if (data.message) return data.message;
    return JSON.stringify(data, null, 2);
}

/* Enter لإرسال */
document.getElementById("messageInput")
    .addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
