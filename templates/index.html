<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سماء • Sky AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    :root {
      --primary: #6366f1;
      --accent: #c026d3;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
    }

    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
    }

    body {
      font-family: 'Cairo', system-ui, sans-serif;
      background: linear-gradient(145deg, #f8fafc, #f3e8ff);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 1.5s ease;
    }

    .chat-app {
      width: 100%;
      max-width: 760px;
      height: 95vh;
      max-height: 900px;
      background: var(--card);
      border-radius: 32px;
      box-shadow: 0 30px 60px -15px rgb(0 0 0 / 0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    .top-bar {
      padding: 20px 26px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #e2e8f0;
    }

    .avatar {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #6366f1, #c026d3);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 26px;
      box-shadow: 0 10px 25px -8px rgba(99, 102, 241, 0.45);
    }

    .title {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #6366f1, #c026d3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .chat-area {
      flex: 1;
      padding: 26px 22px;
      overflow-y: auto;
      background: #f8fafc;
    }

    .message {
      max-width: 82%;
      padding: 16px 22px;
      border-radius: 24px;
      margin-bottom: 18px;
      position: relative;
      animation: messageEnter 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      line-height: 1.65;
      font-size: 15.2px;
    }

    .message.user {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 10px;
    }

    .message.assistant {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 10px;
    }

    .message span {
      font-size: 1.3em;
    }

    .input-bar {
      padding: 18px 22px;
      background: var(--card);
      border-top: 1px solid #e2e8f0;
    }

    .input-container {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border-radius: 20px;
      padding: 10px 14px;
      box-shadow: 0 6px 20px rgb(0 0 0 / 0.06);
    }

    #message-input {
      flex: 1;
      border: none;
      font-size: 15.5px;
      outline: none;
      background: transparent;
    }

    .send-button {
      background: linear-gradient(135deg, #6366f1, #c026d3);
      color: white;
      border: none;
      padding: 12px 26px;
      border-radius: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .send-button:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 15px 30px -8px rgba(99, 102, 241, 0.45);
    }

    @keyframes messageEnter {
      from {
        opacity: 0;
        transform: translateY(25px) scale(0.94);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .love-particle {
      position: absolute;
      font-size: 15px;
      animation: floatUp 1.4s ease forwards;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div class="chat-app">
    
    <!-- الشريط العلوي -->
    <div class="top-bar">
      <div style="display:flex; align-items:center; gap:15px;">
        <div class="avatar"><i class="fas fa-feather-alt"></i></div>
        <div>
          <div class="title">سماء</div>
          <div style="font-size:0.72rem; color:#64748b; margin-top:-2px;">رفيقتك الدافئة</div>
        </div>
      </div>

      <div style="display:flex; gap:10px;">
        <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
        <button id="clear-chat" class="icon-btn"><i class="fas fa-trash-alt"></i></button>
      </div>
    </div>

    <!-- منطقة الشات -->
    <div class="chat-area" id="chat-area">
      <div class="messages" id="messages"></div>
    </div>

    <!-- شريط الإدخال -->
    <div class="input-bar">
      <div class="input-container">
        <input type="text" id="message-input" placeholder="اكتب لسماء بكل راحة..." />
        <button id="send-btn" class="send-button">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>

  </div>

  <script src="/static/script.js"></script>
</body>
</html>
