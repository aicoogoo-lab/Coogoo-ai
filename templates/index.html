<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سماء • Sky AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #6366f1;
      --accent: #c026d3;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }
    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', system-ui, sans-serif;
      background: linear-gradient(145deg, var(--bg), #f3e8ff);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .chat-app {
      width: 100%; max-width: 760px; height: 95vh; max-height: 900px;
      background: var(--card); border-radius: 32px;
      box-shadow: 0 30px 60px -15px rgb(0 0 0 / 0.12);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border);
    }
    .top-bar {
      padding: 20px 26px; display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.75); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: center; gap: 15px; }
    .avatar {
      width: 50px; height: 50px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 26px;
    }
    .title {
      font-size: 1.5rem; font-weight: 800;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { font-size: 0.72rem; color: var(--text-muted); margin-top: -2px; }

    .chat-area { flex: 1; overflow-y: auto; padding: 26px 22px; background: var(--bg); }
    .messages { display: flex; flex-direction: column; gap: 18px; }

    .message {
      max-width: 82%; padding: 16px 22px; border-radius: 24px;
      position: relative; animation: messageEnter 0.4s ease;
      line-height: 1.6; font-size: 15.2px;
    }
    .message.user {
      background: linear-gradient(135deg, var(--primary), #4f46e5);
      color: white; align-self: flex-end; border-bottom-right-radius: 10px;
    }
    .message.assistant {
      background: var(--card); border: 1px solid var(--border);
      align-self: flex-start; border-bottom-left-radius: 10px;
    }

    .typing-indicator {
      align-self: flex-start; background: var(--card); border: 1px solid var(--border);
      padding: 12px 20px; border-radius: 20px; display: flex; gap: 6px;
      color: var(--text-muted); font-size: 0.9rem;
    }
    .dot { width: 7px; height: 7px; background: var(--primary); border-radius: 50%; animation: wave 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    .hidden { display: none !important; }

    .input-bar { padding: 18px 22px; background: var(--card); border-top: 1px solid var(--border); }
    .input-container {
      display: flex; align-items: center; gap: 10px;
      background: white; border-radius: 20px; padding: 10px 14px;
      box-shadow: 0 6px 20px rgb(0 0 0 / 0.06);
    }
    #message-input { flex: 1; border: none; font-size: 15.5px; outline: none; background: transparent; }
    .send-button {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white; border: none; padding: 12px 26px; border-radius: 16px;
      font-weight: 700; cursor: pointer;
    }
    .send-button:hover { transform: translateY(-3px); }

    .file-preview {
      display: flex; align-items: center; gap: 10px;
      background: #f1f5f9; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px;
    }
    .file-preview img { max-height: 60px; border-radius: 8px; }

    @keyframes messageEnter { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes wave { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  </style>
</head>
<body>
  <div class="chat-app">
    <div class="top-bar">
      <div class="brand">
        <div class="avatar"><i class="fas fa-feather-alt"></i></div>
        <div>
          <div class="title">سماء</div>
          <div class="subtitle">رفيقتك الدافئة</div>
        </div>
      </div>
      <div>
        <button id="clear-chat" class="icon-btn"><i class="fas fa-trash-alt"></i></button>
      </div>
    </div>

    <div class="chat-area" id="chat-area">
      <div class="messages" id="messages"></div>
      <div id="typing-indicator" class="typing-indicator hidden">
        <span>سماء تفكر</span>
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-container">
        <input type="file" id="file-input" style="display: none;" multiple>
        <button id="attach-btn" class="icon-btn"><i class="fas fa-paperclip"></i></button>
        <input type="text" id="message-input" placeholder="اكتب لسماء..." autocomplete="off">
        <button id="send-btn" class="send-button"><i class="fas fa-paper-plane"></i></button>
      </div>
      <div id="file-preview-container" style="padding: 0 22px 10px;"></div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
