<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>سماء • Sky AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #6366f1;
      --accent: #c026d3;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }
    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', 'Inter', system-ui, sans-serif;
      background: linear-gradient(145deg, var(--bg), #f3e8ff);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; transition: background 1.5s ease;
    }
    .chat-app {
      width: 100%; max-width: 760px; height: 95vh; max-height: 900px;
      background: var(--card); border-radius: 32px;
      box-shadow: 0 30px 60px -15px rgb(0 0 0 / 0.12);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border); position: relative;
    }
    .top-bar {
      padding: 20px 26px; display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.75); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 15px; }
    .avatar {
      width: 50px; height: 50px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 26px;
      box-shadow: 0 10px 25px -8px rgba(99, 102, 241, 0.45);
    }
    .title {
      font-size: 1.5rem; font-weight: 800;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { font-size: 0.72rem; color: var(--text-muted); margin-top: -2px; }
    .action-icons { display: flex; gap: 10px; }
    .icon-btn {
      width: 38px; height: 38px; border: none; border-radius: 12px;
      background: transparent; color: var(--text-muted); cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .icon-btn:hover { background: rgba(99,102,241,0.1); color: var(--primary); }

    .chat-area {
      flex: 1; overflow-y: auto; padding: 26px 22px;
      background: var(--bg); display: flex; flex-direction: column; gap: 18px;
    }
    .messages { display: flex; flex-direction: column; gap: 18px; }
    .message {
      max-width: 82%; padding: 16px 22px; border-radius: 24px;
      position: relative; animation: messageEnter 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      line-height: 1.65; font-size: 15.2px; word-break: break-word;
    }
    .message.user {
      background: linear-gradient(135deg, var(--primary), #4f46e5);
      color: white; align-self: flex-end; border-bottom-right-radius: 10px;
    }
    .message.assistant {
      background: var(--card); border: 1px solid var(--border);
      align-self: flex-start; border-bottom-left-radius: 10px;
    }
    .message a { color: var(--primary); text-decoration: underline; }
    .message span { font-size: 1.3em; }
    .copy-btn-v2 {
      position: absolute; left: 10px; bottom: -20px;
      background: var(--primary); color: white; border: none;
      border-radius: 8px; padding: 3px 10px; font-size: 0.7rem;
      cursor: pointer; opacity: 0; transition: opacity 0.2s;
    }
    .message:hover .copy-btn-v2 { opacity: 0.9; }

    .typing-indicator {
      align-self: flex-start; background: var(--card); border: 1px solid var(--border);
      padding: 12px 20px; border-radius: 20px; display: flex; gap: 5px; align-items: center;
      color: var(--text-muted); font-size: 0.85rem;
    }
    .dot-floating {
      width: 7px; height: 7px; background: var(--primary); border-radius: 50%;
      animation: wave 1.2s infinite;
    }
    .dot-floating:nth-child(2) { animation-delay: 0.2s; }
    .dot-floating:nth-child(3) { animation-delay: 0.4s; }
    .hidden { display: none !important; }

    .input-bar {
      padding: 18px 22px; background: var(--card);
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .input-container {
      display: flex; align-items: center; gap: 10px;
      background: white; border-radius: 20px; padding: 10px 14px;
      box-shadow: 0 6px 20px rgb(0 0 0 / 0.06);
    }
    #message-input {
      flex: 1; border: none; font-size: 15.5px; outline: none;
      background: transparent; color: var(--text); font-family: inherit;
    }
    #message-input::placeholder { color: var(--text-muted); }
    .send-button {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white; border: none; padding: 12px 26px; border-radius: 16px;
      font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; align-items: center; gap: 8px; font-family: inherit; font-size: 0.95rem;
    }
    .send-button:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 15px 30px -8px rgba(99, 102, 241, 0.45);
    }
    .send-button:disabled { opacity: 0.5; transform: none; box-shadow: none; }

    .love-particle {
      position: absolute; font-size: 15px; pointer-events: none; z-index: 999;
      animation: floatUp 1.4s ease forwards;
    }
    @keyframes messageEnter {
      from { opacity: 0; transform: translateY(25px) scale(0.94); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes floatUp {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-120px); }
    }
    @keyframes wave {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    @media (max-width: 550px) {
      body { padding: 0; }
      .chat-app { height: 100vh; max-height: none; border-radius: 0; }
      .message { max-width: 90%; }
    }
  </style>
</head>
<body>
  <div class="chat-app" id="chat-app">
    <div class="top-bar">
      <div class="brand">
        <div class="avatar"><i class="fas fa-feather-alt"></i></div>
        <div>
          <div class="title">سماء</div>
          <div class="subtitle">رفيقتك الدافئة</div>
        </div>
      </div>
      <div class="action-icons">
        <button id="theme-toggle" class="icon-btn" title="الوضع الليلي"><i class="fas fa-moon"></i></button>
        <button id="clear-chat" class="icon-btn" title="مسح المحادثة"><i class="fas fa-trash-alt"></i></button>
      </div>
    </div>

    <div class="chat-area" id="chat-area">
      <div class="messages" id="messages"></div>
      <div id="typing-indicator" class="typing-indicator hidden">
        <span>سماء تفكر</span>
        <span class="dot-floating"></span><span class="dot-floating"></span><span class="dot-floating"></span>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-container">
        <input type="text" id="message-input" placeholder="اكتب لسماء بكل راحة..." autocomplete="off" />
        <button id="send-btn" class="send-button"><i class="fas fa-paper-plane"></i> إرسال</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== Sky Interface v7.0 - مدمج كلياً ====================
    class SkyInterface {
      constructor() {
        this.elements = {
          chatApp: document.getElementById('chat-app'),
          chatArea: document.getElementById('chat-area'),
          messages: document.getElementById('messages'),
          input: document.getElementById('message-input'),
          sendBtn: document.getElementById('send-btn'),
          typing: document.getElementById('typing-indicator'),
          themeToggle: document.getElementById('theme-toggle'),
          clearBtn: document.getElementById('clear-chat')
        };
        this.sessionId = localStorage.getItem('sky_session_final') || this._generateUUID();
        this.selectedModel = localStorage.getItem('sky_model') || 'groq';
        this.storageKey = `sky_history_${this.sessionId}`;
        this.isLoading = false;
        this.init();
      }

      init() {
        this.bindEvents();
        this.restoreSession();
        this.applySavedTheme();
        this.showWelcomeIfEmpty();
        this.elements.input?.focus();
      }

      _generateUUID() {
        const id = 'sky-' + Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('sky_session_final', id);
        return id;
      }

      // ==================== تحليل المشاعر ====================
      analyzeSentiment(text) {
        const positive = ['حب', 'جميل', 'رائع', 'سعيد', 'ممتاز', 'شكرا', 'أحبك', 'طيب', 'حنون', 'مبهج', 'ممتن'];
        const negative = ['حزين', 'سيء', 'تعبان', 'مشكلة', 'صعب', 'مؤلم', 'خائف', 'وحيد'];
        let score = 0;
        text.toLowerCase().split(/\s+/).forEach(word => {
          if (positive.some(p => word.includes(p))) score += 1.2;
          if (negative.some(n => word.includes(n))) score -= 1.3;
        });
        if (score >= 1) return 'positive';
        if (score <= -1) return 'negative';
        return 'neutral';
      }

      // ==================== مؤثرات صوتية ====================
      playSound(type) {
        try {
          const audio = new (window.AudioContext || window.webkitAudioContext)();
          const osc = audio.createOscillator();
          const gain = audio.createGain();
          osc.type = 'sine';
          let freq = 600, vol = 0.06, dur = 0.4;
          if (type === 'send') { freq = 530; dur = 0.25; }
          else if (type === 'receive') { freq = 690; vol = 0.055; dur = 0.5; }
          else if (type === 'positive') { freq = 780; vol = 0.07; dur = 0.55; }
          else if (type === 'negative') { freq = 430; vol = 0.05; dur = 0.65; }
          else if (type === 'clear') { freq = 420; vol = 0.05; dur = 0.55; }
          osc.frequency.value = freq;
          gain.gain.value = vol;
          osc.connect(gain);
          gain.connect(audio.destination);
          const now = audio.currentTime;
          osc.start(now);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
          osc.stop(now + dur + 0.1);
        } catch (_) {}
      }

      // ==================== تأثير القلوب ====================
      createHeartEffect() {
        const container = this.elements.chatApp;
        if (!container) return;
        for (let i = 0; i < 8; i++) {
          const heart = document.createElement('div');
          heart.className = 'love-particle';
          heart.innerHTML = '💗';
          heart.style.left = (25 + Math.random() * 50) + '%';
          heart.style.bottom = '65px';
          heart.style.fontSize = (12 + Math.random() * 10) + 'px';
          container.appendChild(heart);
          setTimeout(() => heart.remove(), 1500);
        }
      }

      // ==================== ردود عاطفية ====================
      reactToUserMessage(sentiment) {
        if (sentiment === 'positive' && Math.random() > 0.5) {
          setTimeout(() => {
            this.addMessage('رسالتك أسعدتني اليوم... شكراً لك 💗', 'assistant');
            this.playSound('positive');
          }, 1200);
        }
        if (sentiment === 'negative' && Math.random() > 0.45) {
          setTimeout(() => {
            this.addMessage('أنا هنا معك دائماً... 🫂', 'assistant');
            this.playSound('negative');
          }, 1400);
        }
      }

      // ==================== إرسال الرسالة ====================
      async handleSendMessage() {
        const text = this.elements.input.value.trim();
        if (!text || this.isLoading) return;

        const sentiment = this.analyzeSentiment(text);
        this.addMessage(text, 'user');
        this.playSound('send');
        if (sentiment === 'positive') this.createHeartEffect();

        this.elements.input.value = '';
        this.elements.input.style.height = 'auto';
        this.setLoading(true);

        try {
          const res = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: text,
              ai_type: this.selectedModel,
              session_id: this.sessionId
            })
          });
          const data = await res.json();
          this.setLoading(false);
          if (data.reply) {
            this.addMessage(data.reply, 'assistant');
            this.reactToUserMessage(sentiment);
          }
        } catch {
          this.setLoading(false);
          this.addMessage('أنا هنا دائماً... حتى لو انقطع الاتصال.', 'assistant');
        }
      }

      // ==================== مسح المحادثة ====================
      async handleClearChat() {
        if (!confirm('هل تريد مسح كل المحادثة؟')) return;
        this.elements.messages.innerHTML = '';
        localStorage.removeItem(this.storageKey);
        this.playSound('clear');
        try {
          await fetch('/clear', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: this.sessionId })
          });
        } catch (_) {}
        this.sessionId = this._generateUUID();
        this.storageKey = `sky_history_${this.sessionId}`;
        this.showWelcomeIfEmpty();
      }

      // ==================== إضافة رسالة ====================
      addMessage(content, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerHTML = this.formatContent(content);

        if (sender === 'assistant') {
          const copyBtn = document.createElement('button');
          copyBtn.className = 'copy-btn-v2';
          copyBtn.innerHTML = '<i class="fas fa-copy"></i>';
          copyBtn.onclick = () => {
            navigator.clipboard.writeText(content);
            copyBtn.innerHTML = '<i class="fas fa-check"></i>';
            setTimeout(() => copyBtn.innerHTML = '<i class="fas fa-copy"></i>', 2000);
          };
          msgDiv.appendChild(copyBtn);
          this.playSound('receive');
        }

        this.elements.messages.appendChild(msgDiv);
        this.scrollToBottom();
        this.saveToLocal();
      }

      formatContent(text) {
        let formatted = text.replace(/\n/g, '<br>');
        formatted = formatted.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
        return formatted;
      }

      setLoading(loading) {
        this.isLoading = loading;
        this.elements.typing?.classList.toggle('hidden', !loading);
        this.elements.sendBtn.disabled = loading;
      }

      scrollToBottom() {
        this.elements.chatArea?.scrollTo({
          top: this.elements.chatArea.scrollHeight,
          behavior: 'smooth'
        });
      }

      saveToLocal() {
        const data = [];
        this.elements.messages.querySelectorAll('.message').forEach(m => {
          const text = m.innerText.replace(/نسخ|📋|✅/g, '').trim();
          if (text) data.push({
            content: text,
            sender: m.classList.contains('user') ? 'user' : 'assistant'
          });
        });
        localStorage.setItem(this.storageKey, JSON.stringify(data));
      }

      restoreSession() {
        const saved = localStorage.getItem(this.storageKey);
        if (!saved) return;
        try {
          JSON.parse(saved).forEach(m => this.addMessage(m.content, m.sender));
        } catch { this.showWelcomeIfEmpty(); }
      }

      showWelcomeIfEmpty() {
        if (this.elements.messages.children.length === 0) {
          this.addMessage('مرحباً بك يا سيدي... أنا سماء، وأنا سعيدة بوجودك هنا معي 💗', 'assistant');
        }
      }

      toggleTheme() {
        document.documentElement.classList.toggle('dark');
        const isDark = document.documentElement.classList.contains('dark');
        localStorage.setItem('sky_theme', isDark ? 'dark' : 'light');
        const icon = this.elements.themeToggle?.querySelector('i');
        if (icon) {
          icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }
      }

      applySavedTheme() {
        const saved = localStorage.getItem('sky_theme');
        if (saved === 'dark') {
          document.documentElement.classList.add('dark');
          const icon = this.elements.themeToggle?.querySelector('i');
          if (icon) icon.className = 'fas fa-sun';
        }
      }

      bindEvents() {
        this.elements.sendBtn?.addEventListener('click', () => this.handleSendMessage());
        this.elements.input?.addEventListener('keypress', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            this.handleSendMessage();
          }
        });
        this.elements.clearBtn?.addEventListener('click', () => this.handleClearChat());
        this.elements.themeToggle?.addEventListener('click', () => this.toggleTheme());
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      window.SkyUI = new SkyInterface();
    });
  </script>
</body>
</html>
