<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#050507">
  <title>سماء • الشخصيات الحية</title>
  
  <!-- Three.js (تم تعليقه لأننا نستخدم الشخصيات بدلاً من الكرة) -->
  <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script> -->
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/core.css">
  
  <style>
    /* تعديلات بسيطة لاستيعاب الشخصيات */
    .mind-status {
      position: relative;
      z-index: 10;
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(12px);
    }
    #characters-area {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 20;
    }
    /* إخفاء حاوية العقل القديمة إن وجدت */
    #mind-container {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Mind Status -->
  <div class="mind-status">
    <div style="display: flex; align-items: center; gap: 12px;">
      <button class="sky-icon-btn" id="menu-toggle">
        <i class="fas fa-bars"></i>
      </button>
      <div>
        <strong>سماء</strong>
        <span style="color:#64748b; margin: 0 8px;">•</span>
        <span style="color:#a78bfa;">الشخصيات الحية</span>
      </div>
    </div>

    <div class="mind-metrics">
      <div><i class="fas fa-brain"></i> <span id="mind-confidence">85</span>%</div>
      <div><i class="fas fa-database"></i> <span id="memory-count">128</span></div>
      <div id="mind-mood-indicator">
        <i class="fas fa-smile-wink"></i>
        <span>محايد</span>
      </div>
    </div>
  </div>

  <!-- منطقة عرض الشخصيات (سيتم تعبئتها بواسطة JavaScript) -->
  <div id="characters-area"></div>

  <div class="main-container">
    <!-- Sidebar -->
    <aside class="sky-sidebar" id="sidebar">
      <div class="sidebar-section">
        <button class="sky-btn-primary" id="new-session-btn">
          <i class="fas fa-plus"></i> جلسة جديدة
        </button>
      </div>
      <div class="sidebar-section" style="flex:1; overflow-y:auto;">
        <div style="font-size:0.75rem; color:#64748b; margin-bottom:8px;">
          <i class="fas fa-archive"></i> الجلسات المحفوظة
        </div>
        <div id="session-list"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="chat-container">
      <!-- Chat Messages -->
      <div class="chat-messages" id="chat-messages"></div>

      <!-- Input Area -->
      <div class="input-area">
        <button class="sky-icon-btn" id="voice-btn"><i class="fas fa-microphone"></i></button>
        <button class="sky-icon-btn" id="upload-btn"><i class="fas fa-paperclip"></i></button>
        <textarea id="user-input" placeholder="تحدث مع الشخصيات..." rows="1"></textarea>
        <button class="send-button" id="send-btn">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    window.SKY_CONFIG = {
      endpoints: {
        chat: "/api/chat",
        upload: "/upload"
      },
      version: "v11",
      useMockAPI: true
    };
  </script>

  <!-- السكريبتات الأساسية -->
  <script src="/static/js/ui.js"></script>
  <script src="/static/js/mind.js"></script>
  <!-- تم تعطيل three-mind.js لأنه تم الاستغناء عن الكرة -->
  <!-- <script src="/static/js/three-mind.js"></script> -->
  <!-- الشخصيات الحية (المحور الأول) -->
  <script src="/static/js/living-characters.js"></script>
  <!-- المحرك الأساسي -->
  <script src="/static/js/core.js"></script>
  <!-- AR controller (اختياري، يمكن تفعيله لاحقاً) -->
  <!-- <script src="/static/js/ar-controller.js"></script> -->
  
  <script>
    // تحديث مؤشر المزاج من أحداث الشخصيات
    window.addEventListener('mind-mood-change', (e) => {
      const moodSpan = document.querySelector('#mind-mood-indicator span');
      if (moodSpan) moodSpan.textContent = e.detail.mood === 'happy' ? 'سعيد' : e.detail.mood === 'sad' ? 'حزين' : 'محايد';
    });
    console.log('✅ سماء جاهزة مع الشخصيات الحية');
  </script>
</body>
</html>
