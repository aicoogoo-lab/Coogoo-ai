<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="description" content="SkyOS v10 — Holographic PWA Intelligence System" />
  <title>SkyOS v10 — Holographic Edition</title>

  <link rel="manifest" href="/manifest.json" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') if url_for else '/static/icons/icon-192.png' }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') if url_for else '/static/css/style.css' }}" />

  <link rel="preload" href="{{ url_for('static', filename='js/script.js') if url_for else '/static/js/script.js' }}" as="script" />
</head>

<body class="dark sky-mode-{{ ui_mode if ui_mode else 'holo' }}">

  <div class="sky-background">
    <div class="sky-gradient"></div>
    <div class="sky-glow-layer"></div>
    <canvas id="sky-particles" class="sky-canvas"></canvas>
  </div>

  <div id="sky-root">

    <header class="sky-topbar glass-layer">
      <div class="sky-topbar-left">
        <div class="sky-brand">
          <div class="sky-logo hologram">
            <i class="fas fa-brain"></i>
          </div>
          <div class="sky-brand-text">
            <div class="sky-brand-title">SkyOS v10</div>
            <div class="sky-brand-subtitle">Holographic Intelligence</div>
          </div>
        </div>
      </div>

      <div class="sky-topbar-center">
        <div class="sky-status" id="connection-status">
          <span class="sky-status-dot animated-pulse"></span>
          <span class="sky-status-text"><i class="fas fa-plug"></i> متصل • جاهز</span>
        </div>
      </div>

      <div class="sky-topbar-right">
        <button class="sky-icon-btn" id="menu-toggle" title="القائمة"><i class="fas fa-bars"></i></button>
        <button class="sky-icon-btn" id="toggle-theme-btn" title="المظهر"><i class="fas fa-moon"></i></button>
        <button class="sky-icon-btn" id="open-settings-btn" title="الإعدادات"><i class="fas fa-cog"></i></button>
      </div>
    </header>

    <div class="sky-layout">

      <aside class="sky-sidebar glass-layer" id="sidebar">

        <div class="sky-sidebar-section">
          <div class="sky-sidebar-title"><i class="fas fa-plus-circle"></i> الجلسات</div>
          <button class="sky-btn-primary full" id="new-session-btn">
            <i class="fas fa-plus"></i> جلسة جديدة
          </button>
        </div>

        <div class="sky-sidebar-section">
          <div class="sky-sidebar-title"><i class="fas fa-archive"></i> الأرشيف</div>
          <div class="sky-session-list" id="session-list">
            <div class="sky-session-empty">
              <i class="fas fa-inbox"></i><br>لا يوجد أرشيف بعد
            </div>
          </div>
        </div>

        <div class="sky-sidebar-section">
          <div class="sky-sidebar-title"><i class="fas fa-paperclip"></i> التحكم والملفات</div>
          <label class="sky-btn-secondary full" style="display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;">
            <i class="fas fa-upload"></i> رفع ملف عام
            <input type="file" id="file-input" hidden />
          </label>
          <button class="sky-btn-secondary full" id="clear-chat-btn"><i class="fas fa-trash-alt"></i> مسح المحادثة</button>
          <button class="sky-btn-secondary full" id="export-chat-btn"><i class="fas fa-file-export"></i> تصدير المحادثة</button>
        </div>

        <div class="sky-sidebar-section">
          <div class="sky-sidebar-title"><i class="fas fa-microphone"></i> الصوت والرؤية</div>
          <button class="sky-btn-secondary full" id="voice-btn"><i class="fas fa-microphone"></i> إرسال صوت</button>
          <button class="sky-btn-secondary full" id="vision-btn"><i class="fas fa-image"></i> إرسال صورة</button>
        </div>

        <div class="sky-sidebar-section">
          <div class="sky-sidebar-title"><i class="fas fa-folder-open"></i> Workspace</div>
          <button class="sky-btn-secondary full" id="open-workspace-btn"><i class="fas fa-brain"></i> مساحة العمل</button>
        </div>

      </aside>

      <main class="sky-main">

        <div class="sky-chat-header glass-layer">
          <div>
            <div class="sky-chat-title"><i class="fas fa-comments"></i> جلسة مع سماء</div>
            <div class="sky-chat-subtitle">ذكاء هجين واعٍ • يتذكر • يحلل • يتطور</div>
          </div>

          <div class="sky-chat-meta">
            <div class="sky-chat-meta-item">
              <span class="dot active"></span>
              <span id="model-indicator"><i class="fas fa-microchip"></i> الموفر: تلقائي</span>
            </div>
            <div class="sky-chat-meta-item">
              <span class="dot session"></span>
              <span id="session-indicator"><i class="fas fa-id-card"></i> جلسة: افتراضية</span>
            </div>
          </div>
        </div>

        <section class="sky-chat-window" id="chat-window"></section>

        <div id="file-preview-bar" class="sky-preview-bar hidden">
          <span id="preview-file-name"></span>
          <button id="cancel-upload-btn" class="sky-cancel-btn"><i class="fas fa-times"></i></button>
        </div>

        <footer class="sky-input-bar glass-layer">
          <div class="sky-input-tools">
            <button class="sky-icon-btn" id="mini-upload-btn" title="إرفاق ملف"><i class="fas fa-paperclip"></i></button>
            <button class="sky-icon-btn" id="mini-voice-btn" title="تسجيل صوتي"><i class="fas fa-microphone"></i></button>
            <button class="sky-icon-btn" id="mini-vision-btn" title="التقاط صورة"><i class="fas fa-camera"></i></button>
          </div>

          <textarea id="user-input" class="sky-input" placeholder="اكتب لـ سماء..." rows="1"></textarea>

          <button class="sky-send-btn" id="send-btn">
            <i class="fas fa-paper-plane"></i> <span>إرسال</span>
          </button>
        </footer>

      </main>
    </div>

    <input type="file" id="hidden-audio-input" accept="audio/*" hidden />
    <input type="file" id="hidden-image-input" accept="image/*" hidden />

    <div id="toast-container"></div>
    
    <div id="settings-panel" class="sky-settings hidden">
      </div>
    <div id="workspace-panel" class="sky-workspace hidden">
      </div>

  </div>

  <script>
    const SKY_CONFIG = {
      ui_mode: "{{ ui_mode if ui_mode else 'holo' }}",
      endpoints: {
        ask: "/api/chat",         // تصحيح فوري ليتوافق مع المسار المعتمد في الـ Backend للـ API Router
        upload: "/scrape",        // توجيه دالة معالجة روابط المواقع والكشط
        voice: "/api/chat",       // إرسال كود معالجة المحادثات الصوتية المكتوبة
        vision: "/api/chat",      // معالجة الصور المباشرة
        feedback: "/scrape",      // مرن
        clear: "/os/desktop",
        status: "/"               // Health Check الرئيسي للسيرفر
      }
    };
  </script>

  <script src="{{ url_for('static', filename='js/script.js') if url_for else '/static/js/script.js' }}" defer></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js")
          .then(reg => console.log("🚀 SkyOS Holographic Core PWA Ready! Scope:", reg.scope))
          .catch(err => console.error("❌ PWA Worker Error:", err));
      });
    }
  </script>

</body>
</html>
