<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>سماء | SkyOS</title>

<style>
body {
    margin: 0;
    font-family: "Tahoma";
    background: linear-gradient(135deg, #0a0f1f, #05080f);
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    background: #111827;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 2px solid #1f2937;
}

#chatBox {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.message {
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    max-width: 70%;
    white-space: pre-wrap;
}

.user {
    background: #1e40af;
    margin-left: auto;
}

.bot {
    background: #374151;
    margin-right: auto;
}

#inputArea {
    display: flex;
    padding: 15px;
    border-top: 2px solid #1f2937;
}

#inputArea input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
}

#inputArea button {
    margin-right: 10px;
    padding: 12px 20px;
    background: #10b981;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

#inputArea button:disabled {
    background: gray;
    cursor: not-allowed;
}

.logout {
    position: absolute;
    top: 15px;
    left: 15px;
    background: red;
    padding: 8px 12px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
}
</style>
</head>

<body>

<a href="/logout" class="logout">تسجيل خروج</a>

<header>🌌 سماء - SkyOS</header>

<div id="chatBox">
    <div class="message bot">مرحبًا 👋 أنا سماء، اكتب أمرك.</div>
</div>

<div id="inputArea">
    <input id="messageInput" type="text" placeholder="اكتب أمرًا...">
    <button id="sendBtn" onclick="sendMessage()">إرسال</button>
</div>

<script>
const input = document.getElementById("messageInput");
const btn = document.getElementById("sendBtn");

async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    btn.disabled = true;

    // رسالة تحميل
    const loadingId = addMessage("⏳ جاري المعالجة...", "bot");

    try {
        const response = await fetch("/api/command", {
            method: "POST",
            credentials: "include", // مهم للجلسة
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json" // ✅ مهم لحل JSON.parse
            },
            body: JSON.stringify({ command: text })
        });

        // ✅ تحقق قبل JSON
        const contentType = response.headers.get("content-type");

        if (!response.ok) {
            const txt = await response.text();
            throw new Error("Server Error: " + txt);
        }

        if (!contentType || !contentType.includes("application/json")) {
            const txt = await response.text();
            throw new Error("لم يتم إرجاع JSON:\n" + txt.slice(0, 200));
        }

        const data = await response.json();

        removeMessage(loadingId);

        if (data.success === false) {
            addMessage("❌ " + (data.error || "خطأ غير معروف"), "bot");
        } else {
            addMessage(formatResponse(data), "bot");
        }

    } catch (err) {
        removeMessage(loadingId);
        addMessage("⚠️ خطأ في الاتصال:\n" + err.message, "bot");
    }

    btn.disabled = false;
}

/* إضافة رسالة */
function addMessage(text, type) {
    const chatBox = document.getElementById("chatBox");
    const div = document.createElement("div");

    div.className = "message " + type;
    div.innerText = text;

    const id = Date.now();
    div.dataset.id = id;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;

    return id;
}

/* حذف رسالة (للتحميل) */
function removeMessage(id) {
    const el = document.querySelector(`[data-id='${id}']`);
    if (el) el.remove();
}

/* تنسيق الرد */
function formatResponse(data) {
    if (typeof data === "string") return data;

    if (data.response) return data.response;
    if (data.message) return data.message;

    return JSON.stringify(data, null, 2);
}

/* Enter للإرسال */
input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
