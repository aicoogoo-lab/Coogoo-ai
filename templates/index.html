<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky OS • Hybrid Intelligence</title>

    <!-- روابط ملفات الستايل والسكربت -->
    <link rel="stylesheet" href="/static/style.css">
    <script defer src="/static/script.js"></script>

    <!-- خط وأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- ========================= طبقة الخلفية السائلة ========================= -->
<div class="liquid-background"></div>

<!-- ========================= طبقة الهولوغرافي العصبي ========================= -->
<div class="holo-layer"></div>

<!-- ========================= طبقة النظام الرئيسية ========================= -->
<div class="sky-os">

    <!-- ========================= الشريط العلوي (Top Bar) ========================= -->
    <header class="top-bar">
        <div class="brand">
            <div class="brand-orb">
                <i class="fa-solid fa-sparkles"></i>
            </div>
            <div class="brand-text">
                <div class="brand-title">سماء</div>
                <div class="brand-subtitle">Hybrid Intelligence OS</div>
            </div>
        </div>

        <div class="top-actions">
            <button id="new-session" class="icon-btn" title="جلسة جديدة">
                <i class="fa-solid fa-plus"></i>
            </button>

            <button id="theme-toggle" class="icon-btn" title="الوضع الليلي/النهاري">
                <i class="fa-regular fa-moon"></i>
            </button>

            <button id="settings-btn" class="icon-btn" title="الإعدادات">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </header>

    <!-- ========================= طبقة الجلسات (Sessions Sidebar) ========================= -->
    <aside class="sessions-panel" id="sessions-panel">
        <div class="sessions-header">
            <span>جلساتك</span>
            <button id="close-sessions" class="icon-btn small">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="sessions-list" id="sessions-list">
            <!-- الجلسات تُضاف هنا ديناميكياً -->
        </div>

        <button id="create-session" class="new-session-btn">
            <i class="fa-solid fa-plus"></i>
            <span>جلسة جديدة</span>
        </button>
    </aside>

    <!-- ========================= طبقة الأدوات الذكية (Tools Panel) ========================= -->
    <aside class="tools-panel" id="tools-panel">
        <div class="tools-header">
            <span>أدوات سماء</span>
            <button id="close-tools" class="icon-btn small">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="tools-list">
            <button class="tool-btn" data-tool="summarize">
                <i class="fa-solid fa-align-left"></i>
                <span>تلخيص</span>
            </button>

            <button class="tool-btn" data-tool="analyze">
                <i class="fa-solid fa-brain"></i>
                <span>تحليل</span>
            </button>

            <button class="tool-btn" data-tool="code">
                <i class="fa-solid fa-code"></i>
                <span>توليد كود</span>
            </button>

            <button class="tool-btn" data-tool="ideas">
                <i class="fa-solid fa-lightbulb"></i>
                <span>أفكار</span>
            </button>

            <button class="tool-btn" data-tool="rewrite">
                <i class="fa-solid fa-pen-nib"></i>
                <span>إعادة صياغة</span>
            </button>

            <button class="tool-btn" data-tool="file">
                <i class="fa-solid fa-file"></i>
                <span>تحليل ملف</span>
            </button>
        </div>
    </aside>

    <!-- ========================= طبقة الوعي السياقي (Context Bar) ========================= -->
    <div class="context-bar" id="context-bar">
        <i class="fa-solid fa-circle-nodes"></i>
        <span id="context-text">وضع المحادثة</span>
    </div>

    <!-- ========================= طبقة المحادثة ========================= -->
    <main class="chat-area">

        <!-- أرشيف الجلسة -->
        <div class="archive-section" id="archive-section">
            <button id="archive-toggle" class="archive-toggle">
                <i class="fa-solid fa-box-archive"></i>
                <span>عرض الأرشيف</span>
                <i class="fa-solid fa-chevron-down"></i>
            </button>

            <div class="archive-content" id="archive-content">
                <div class="archive-messages" id="archive-messages"></div>
            </div>
        </div>

        <!-- الرسائل -->
        <div class="messages" id="messages"></div>

        <!-- مؤشر الكتابة -->
        <div id="typing-indicator" class="typing hidden">
            <span>سماء تفكر...</span>
            <div class="dots">
                <span></span><span></span><span></span>
            </div>
        </div>

    </main>

    <!-- ========================= أزرار التنقل (Scroll Controls) ========================= -->
    <div class="scroll-controls">
        <button id="scroll-up" class="scroll-btn">
            <i class="fa-solid fa-chevron-up"></i>
        </button>
        <button id="scroll-down" class="scroll-btn">
            <i class="fa-solid fa-chevron-down"></i>
        </button>
    </div>

    <!-- ========================= شريط الإدخال ========================= -->
    <footer class="input-bar">
        <div class="input-shell">
            <input type="file" id="file-input" multiple hidden>

            <button id="attach-btn" class="icon-btn">
                <i class="fa-solid fa-paperclip"></i>
            </button>

            <input id="message-input" type="text" placeholder="اكتب لسماء..." autocomplete="off">

            <button id="send-btn" class="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>

        <div id="file-preview" class="file-preview"></div>
    </footer>

</div>

</body>
</html>
