<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>سماء – Sky AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
    body { margin: 0; background: #f3e8ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .chat-app { width: 100%; max-width: 480px; height: 100vh; background: #ffffff; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 20px rgba(139,92,246,0.1); }
    .top-bar { height: 56px; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; background: #f5f0ff; border-bottom: 1px solid #ede4ff; flex-shrink: 0; }
    .title-block { display: flex; align-items: center; gap: 8px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #a78bfa); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 18px; }
    .app-name { font-size: 16px; font-weight: 600; color: #4c1d95; }
    .app-subtitle { font-size: 11px; color: #7c3aed; }
    .icon-btn { border: none; background: transparent; font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
    .model-switch { display: flex; gap: 8px; padding: 6px 10px; border-bottom: 1px solid #ede4ff; background: #faf8ff; flex-shrink: 0; }
    .model-btn { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid #d8ccff; background: #fff; color: #4c1d95; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .model-btn.active { background: #7c3aed; border-color: #7c3aed; color: #fff; font-weight: 600; }
    .chat-container { flex: 1; padding: 12px; background: #f5f0ff; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .messages { display: flex; flex-direction: column; gap: 8px; }
    .message { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-wrap: break-word; animation: fadeIn 0.2s; }
    .message.user { align-self: flex-end; background: #ede4ff; color: #1e1b4b; border-bottom-right-radius: 4px; }
    .message.assistant { align-self: flex-start; background: #4c1d95; color: #f5f0ff; border-bottom-left-radius: 4px; }
    .typing { align-self: flex-start; display: flex; gap: 4px; padding: 4px 12px; background: #4c1d95; border-radius: 20px; }
    .typing .dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; animation: blink 1.2s infinite; }
    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }
    .hidden { display: none !important; }
    .bottom-bar { height: 56px; padding: 6px 8px; border-top: 1px solid #ede4ff; background: #faf8ff; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .input-wrapper { flex: 1; background: #fff; border-radius: 20px; border: 1px solid #d8ccff; padding: 0 12px; display: flex; align-items: center; height: 38px; }
    #message-input { flex: 1; border: none; outline: none; background: transparent; font-size: 14px; color: #1e1b4b; }
    #message-input::placeholder { color: #a78bfa; }
    .send-btn { border: none; border-radius: 20px; padding: 8px 18px; background: #7c3aed; color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; transition: background 0.2s; }
    .send-btn:active { background: #6d28d9; }
    #upload-btn { font-size: 20px; cursor: pointer; padding: 4px; color: #7c3aed; }
    .settings-panel { position: absolute; bottom: 0; left: 0; right: 0; max-width: 480px; margin: auto; background: #fff; border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0 -4px 20px rgba(139,92,246,0.2); padding: 16px; z-index: 10; }
    .settings-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: bold; color: #4c1d95; }
    .settings-item { margin-bottom: 12px; }
    .settings-item label { font-size: 12px; color: #4c1d95; display: block; margin-bottom: 4px; }
    .settings-item select { width: 100%; padding: 8px; border-radius: 10px; border: 1px solid #d8ccff; font-size: 14px; }
    .settings-note { font-size: 11px; color: #a78bfa; margin-top: 8px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="chat-app">
    <header class="top-bar">
      <div class="title-block">
        <div class="avatar">س</div>
        <div>
          <div class="app-name">سماء</div>
          <div class="app-subtitle">ذكاء خاص • Groq + Gemini</div>
        </div>
      </div>
      <button id="settings-btn" class="icon-btn">⚙️</button>
    </header>

    <div class="model-switch">
      <button id="groq-btn" class="model-btn active" data-model="groq">Groq (Llama)</button>
      <button id="gemini-btn" class="model-btn" data-model="gemini">Gemini</button>
    </div>

    <main class="chat-container">
      <div id="messages" class="messages"></div>
      <div id="typing" class="typing hidden">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </main>

    <footer class="bottom-bar">
      <button id="clear-btn" class="icon-btn small">🧹</button>
      <div class="input-wrapper">
        <input id="message-input" type="text" placeholder="اكتب رسالتك لسماء..." />
      </div>
      <!-- زر رفع الملفات -->
      <label id="upload-btn" for="file-upload" title="أرسل صورة أو ملفًا">📎</label>
      <input type="file" id="file-upload" style="display: none;" accept="image/*,.pdf,.txt,.doc,.docx" />
      <button id="send-btn" class="send-btn">إرسال</button>
    </footer>

    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-header">
        <span>الإعدادات</span>
        <button id="close-settings" class="icon-btn">✖️</button>
      </div>
      <div class="settings-body">
        <div class="settings-item">
          <label>النموذج الافتراضي</label>
          <select id="default-model">
            <option value="groq">Groq (Llama)</option>
            <option value="gemini">Gemini</option>
          </select>
        </div>
        <div class="settings-item">
          <label>نبرة المساعد</label>
          <select id="tone-select">
            <option value="balanced">سماء (افتراضي)</option>
            <option value="casual">ودودة</option>
            <option value="formal">رسمية</option>
          </select>
        </div>
        <p class="settings-note">هذه الإعدادات قيد التطوير.</p>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const typingEl = document.getElementById("typing");
    const inputEl = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");
    const groqBtn = document.getElementById("groq-btn");
    const geminiBtn = document.getElementById("gemini-btn");
    const clearBtn = document.getElementById("clear-btn");
    const settingsBtn = document.getElementById("settings-btn");
    const settingsPanel = document.getElementById("settings-panel");
    const closeSettingsBtn = document.getElementById("close-settings");
    const defaultModelSelect = document.getElementById("default-model");
    const fileUpload = document.getElementById("file-upload");

    let selectedModel = "groq";

    function setModel(model) {
      selectedModel = model;
      groqBtn.classList.toggle("active", model === "groq");
      geminiBtn.classList.toggle("active", model === "gemini");
    }

    groqBtn.addEventListener("click", () => setModel("groq"));
    geminiBtn.addEventListener("click", () => setModel("gemini"));

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = `message ${sender}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      addMessage(text, "user");
      inputEl.value = "";
      typingEl.classList.remove("hidden");

      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, ai_type: selectedModel })
        });
        const data = await res.json();
        typingEl.classList.add("hidden");
        addMessage(data.reply || "لم يصل رد.", "assistant");
      } catch (e) {
        typingEl.classList.add("hidden");
        addMessage("تعذر الاتصال بسماء.", "assistant");
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    // رفع الملفات
    fileUpload.addEventListener("change", async () => {
      const file = fileUpload.files[0];
      if (!file) return;

      addMessage(`📎 رفع ملف: ${file.name}`, "user");
      typingEl.classList.remove("hidden");

      const formData = new FormData();
      formData.append("file", file);

      try {
        const res = await fetch("/upload", {
          method: "POST",
          body: formData
        });
        const data = await res.json();
        typingEl.classList.add("hidden");
        addMessage(data.reply || "تم استلام الملف.", "assistant");
      } catch (e) {
        typingEl.classList.add("hidden");
        addMessage("فشل رفع الملف إلى سماء.", "assistant");
      }

      fileUpload.value = ""; // إعادة تعيين
    });

    clearBtn.addEventListener("click", async () => {
      messagesEl.innerHTML = "";
      try { await fetch("/clear", { method: "POST" }); } catch(e) {}
    });

    settingsBtn.addEventListener("click", () => settingsPanel.classList.remove("hidden"));
    closeSettingsBtn.addEventListener("click", () => settingsPanel.classList.add("hidden"));
    defaultModelSelect.addEventListener("change", (e) => setModel(e.target.value));

    document.addEventListener("click", (e) => {
      if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) {
        settingsPanel.classList.add("hidden");
      }
    });

    inputEl.focus();
  </script>
</body>
</html>
