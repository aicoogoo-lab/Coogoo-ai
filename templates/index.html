<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>سماء – مساعدك الذكي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="app">
        <header class="top-bar">
            <div class="title-block">
                <div class="logo-circle">س</div>
                <div>
                    <div class="app-title">سماء</div>
                    <div class="app-subtitle">ذكاء خاص • Groq + Gemini</div>
                </div>
            </div>
            <button id="settingsToggle" class="icon-button" title="الإعدادات">⚙️</button>
        </header>

        <main class="chat-layout">
            <aside id="settingsPanel" class="settings hidden">
                <div class="settings-header">
                    <span>الإعدادات</span>
                    <button id="closeSettings" class="icon-button">✖️</button>
                </div>

                <div class="settings-group">
                    <label class="settings-label">النموذج الافتراضي</label>
                    <select id="modelSelect">
                        <option value="groq">Groq (Llama)</option>
                        <option value="gemini">Gemini</option>
                    </select>
                </div>

                <div class="settings-group">
                    <label class="settings-label">نبرة سماء</label>
                    <p class="settings-note">
                        رسمية، ودّية، هادئة، حيوية، مزوحة، جريئة، شجاعة، مسيطرة، متحكمة، خاضعة…  
                        يتم اختيار الأنسب تلقائيًا حسب سياق المحادثة.
                    </p>
                </div>

                <div class="settings-group">
                    <button id="clearChat" class="danger-button">مسح المحادثة بالكامل</button>
                </div>

                <p class="settings-footer">
                    هذه الإعدادات قيد التطوير المستمر لتحسين تجربة سماء معك.
                </p>
            </aside>

            <section class="chat-section">
                <div id="chatWindow" class="chat-window">
                    <!-- الرسائل تُضاف هنا ديناميكياً -->
                </div>
            </section>
        </main>

        <footer class="input-bar">
            <button id="clearLocal" class="icon-button" title="تنظيف الشاشة">🧹</button>
            <textarea id="userInput" rows="1" placeholder="اكتب رسالتك لسماء..."></textarea>
            <button id="sendBtn" class="send-button">إرسال</button>
        </footer>

        <button id="scrollDownBtn" class="scroll-down hidden" title="الانتقال لآخر الرسائل">⬇️</button>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
