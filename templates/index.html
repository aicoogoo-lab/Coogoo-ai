<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="description" content="SkyOS v9.0 — Ultimate Hybrid Intelligence System" />
  <title>SkyOS v9.0 — الذكاء الهجين النهائي</title>

  <!-- Performance Boost (من نسختك) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

  <!-- Cairo Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Main CSS -->
  <link rel="stylesheet" href="/static/css/style.css" />

  <!-- Preload JS (من نسختك - تحسين أداء) -->
  <link rel="preload" href="/static/js/script.js" as="script" />
  <link rel="preload" href="/static/css/style.css" as="style" />
</head>

<body class="dark">

  <!-- Background Layers -->
  <div class="sky-background" aria-hidden="true">
    <div class="sky-gradient"></div>
    <div class="sky-glow-layer"></div>
    <canvas id="sky-particles" class="sky-canvas"></canvas>
  </div>

  <!-- Root Container -->
  <div id="sky-root">

    <!-- Topbar (دمج الأفضل) -->
    <header class="sky-topbar glass-layer">
      <div class="sky-topbar-left">
        <div class="sky-brand">
          <div class="sky-logo hologram">
            <i class="fas fa-brain"></i>
          </div>
          <div class="sky-brand-text">
            <div class="sky-brand-title">SkyOS v9.0</div>
            <div class="sky-brand-subtitle">Ultimate Hybrid Intelligence</div>
          </div>
        </div>
      </div>

      <!-- حالة الاتصال (من النسخة الكاملة) -->
      <div class="sky-topbar-center">
        <div class="sky-status" id="connection-status">
          <span class="sky-status-dot"></span>
          <span class="sky-status-text"><i class="fas fa-plug"></i> متصل • جاهز</span>
        </div>
      </div>

      <!-- أزرار topbar (دمج) -->
      <div class="sky-topbar-right">
        <button class="sky-icon-btn" id="menu-toggle" title="القائمة الجانبية">
          <i class="fas fa-bars"></i>
        </button>
        <button class="sky-icon-btn" id="toggle-theme-btn" title="تبديل الثيم">
          <i class="fas fa-moon"></i>
        </button>
        <button class="sky-icon-btn" id="open-settings-btn" title="الإعدادات المتقدمة">
          <i class="fas fa-cog"></i>
        </button>
      </div>
    </header>

    <!-- Main Layout -->
    <div class="sky-layout">

      <!-- Sidebar (دمج - أخف وزناً مع الاحتفاظ بالميزات) -->
      <aside class="sky-sidebar glass-layer" id="sidebar" aria-label="القائمة الجانبية">

        <div class="sky-sidebar-section">
          <div class="sky-sidebar-title"><i class="fas fa-plus-circle"></i> الجلسات</div>
          <button class="sky-btn-primary full" id="new-session-btn" title="جلسة جديدة">
            <i class="fas fa-plus"></i> جلسة جديدة
          </button>
        </div>

        <div class="sky-sidebar-section">
          <div class="sky-sidebar-title"><i class="fas fa-archive"></i> الأرشيف</div>
          <div class="sky-session-list" id="session-list" aria-label="قائمة الجلسات">
            <div class="sky-session-empty">
              <i class="fas fa-inbox"></i><br />لا يوجد أرشيف بعد
            </div>
          </div>
        </div>

        <div class="sky-sidebar-section">
          <div class="sky-sidebar-title"><i class="fas fa-paperclip"></i> الملفات</div>
          <label class="sky-btn-secondary full" style="display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;" title="رفع ملف">
            <i class="fas fa-upload"></i> رفع ملف
            <input type="file" id="file-input" hidden />
          </label>
          <!-- أزرار إضافية (من النسخة الكاملة) -->
          <button class="sky-btn-secondary full" id="clear-chat-btn" title="مسح المحادثة">
            <i class="fas fa-trash-alt"></i> مسح المحادثة
          </button>
          <button class="sky-btn-secondary full" id="export-chat-btn" title="تصدير المحادثة">
            <i class="fas fa-file-export"></i> تصدير المحادثة
          </button>
        </div>

        <div class="sky-sidebar-section">
          <div class="sky-sidebar-title"><i class="fas fa-microphone"></i> الصوت والرؤية</div>
          <button class="sky-btn-secondary full" id="voice-btn" title="إرسال صوت">
            <i class="fas fa-microphone"></i> إرسال صوت
          </button>
          <button class="sky-btn-secondary full" id="vision-btn" title="إرسال صورة">
            <i class="fas fa-image"></i> إرسال صورة
          </button>
        </div>

        <div class="sky-sidebar-section">
          <div class="sky-sidebar-title"><i class="fas fa-folder-open"></i> Workspace</div>
          <button class="sky-btn-secondary full" id="open-workspace-btn" title="مساحة العمل">
            <i class="fas fa-brain"></i> مساحة العمل
          </button>
        </div>

      </aside>

      <!-- Main Chat Area -->
      <main class="sky-main">

        <!-- Chat Header (من النسخة الكاملة) -->
        <div class="sky-chat-header glass-layer">
          <div>
            <div class="sky-chat-title"><i class="fas fa-comments"></i> جلسة مع SkyOS</div>
            <div class="sky-chat-subtitle">ذكاء هجين واعٍ • يتذكر • يحلل • يتطور</div>
          </div>

          <div class="sky-chat-meta">
            <div class="sky-chat-meta-item">
              <span class="dot"></span>
              <span id="model-indicator"><i class="fas fa-microchip"></i> النموذج: تلقائي</span>
            </div>
            <div class="sky-chat-meta-item">
              <span class="dot"></span>
              <span id="session-indicator"><i class="fas fa-id-card"></i> جلسة جديدة</span>
            </div>
          </div>
        </div>

        <!-- Chat Window -->
        <section class="sky-chat-window" id="chat-window" aria-live="polite"></section>

        <!-- Input Bar (دمج - مع تحسينات) -->
        <footer class="sky-input-bar glass-layer">
          <div class="sky-input-tools">
            <button class="sky-icon-btn" id="mini-upload-btn" title="رفع ملف">
              <i class="fas fa-paperclip"></i>
            </button>
            <button class="sky-icon-btn" id="mini-voice-btn" title="إرسال صوت">
              <i class="fas fa-microphone"></i>
            </button>
            <button class="sky-icon-btn" id="mini-vision-btn" title="إرسال صورة">
              <i class="fas fa-camera"></i>
            </button>
          </div>

          <textarea 
            id="user-input" 
            class="sky-input" 
            placeholder="اكتب لـ SkyOS... /help للأوامر السريعة"
            rows="1"
            aria-label="حقل الإدخال"
          ></textarea>

          <button class="sky-send-btn" id="send-btn" title="إرسال">
            <i class="fas fa-paper-plane"></i> <span>إرسال</span>
          </button>
        </footer>

      </main>
    </div>

    <!-- Hidden Inputs -->
    <input type="file" id="hidden-audio-input" accept="audio/*" hidden />
    <input type="file" id="hidden-image-input" accept="image/*" hidden />

    <!-- Toasts -->
    <div id="toast-container" aria-live="polite"></div>

    <!-- Panels -->
    <div id="settings-panel" class="sky-settings hidden" aria-label="لوحة الإعدادات"></div>
    <div id="workspace-panel" class="sky-workspace hidden" aria-label="لوحة مساحة العمل"></div>

  </div>

  <!-- Global Configuration -->
  <script>
    const SKY_CONFIG = {
      endpoints: {
        ask: "/ask",
        upload: "/upload",
        voice: "/voice",
        vision: "/vision",
        feedback: "/feedback",
        clear: "/clear",
        status: "/api/v1/status"
      }
    };
  </script>

  <!-- Main JavaScript (مع preload من نسختك) -->
  <script src="/static/js/script.js" defer></script>

  <!-- بديل احتياطي في حال فشل تحميل الـ CSS -->
  <noscript>
    <style>
      body { background: #0a0a14; color: white; padding: 20px; font-family: sans-serif; }
      .no-script-message { text-align: center; margin-top: 50px; }
    </style>
    <div class="no-script-message">
      <h1>⚠️ يرجى تفعيل JavaScript</h1>
      <p>SkyOS يحتاج إلى JavaScript ليعمل بشكل صحيح</p>
    </div>
  </noscript>

</body>
</html>
