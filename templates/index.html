<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>سماء • Sky AI</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <canvas id="neural-net-fluid"></canvas>

  <div class="main-workspace">
    
    <aside id="sidebar-archive" class="sidebar-archive">
      <div class="sidebar-header">
        <span class="archive-title"><i class="fas fa-box-archive"></i> ذاكرة السحاب</span>
        <button id="close-archive-btn" class="action-btn"><i class="fas fa-chevron-right"></i></button>
      </div>
      <button id="new-chat-sidebar-btn" class="prime-action-btn"><i class="fas fa-plus"></i> جلسة ذكية جديدة</button>
      <div id="archive-sessions-container" class="archive-sessions-container">
        </div>
    </aside>

    <main class="app-core">
      
      <header class="top-nav-bar">
        <div class="identity-block">
          <button id="menu-toggle-btn" class="action-btn" title="فتح الأرشيف"><i class="fas fa-bars"></i></button>
          <div class="avatar-intelligence">
            <i class="fas fa-feather-alt"></i>
            <span class="pulse-core"></span>
          </div>
          <div class="meta-data">
            <h1 class="core-title">سماء</h1>
            <span class="system-status-indicator">النظام الإدراكي متصل</span>
          </div>
        </div>
        <div class="control-block">
          <button id="clear-session-btn" class="action-btn danger-zone" title="مسح الجلسة الحالية"><i class="fas fa-trash-can"></i></button>
        </div>
      </header>

      <section class="viewport-stream" id="viewport-stream">
        
        <div id="scroll-navigator" class="scroll-navigator">
          <button onclick="executeQuickScroll('top')" id="scroll-top-btn" class="nav-scroll-btn"><i class="fas fa-arrow-up"></i></button>
          <button onclick="executeQuickScroll('bottom')" id="scroll-bottom-btn" class="nav-scroll-btn"><i class="fas fa-arrow-down"></i></button>
        </div>

        <div class="messages-container" id="messages-container">
          </div>
        
        <div id="neural-thinking-indicator" class="neural-thinking-box hidden">
          <div class="thinking-avatar"><i class="fas fa-brain"></i></div>
          <div class="thinking-status">
            <span>سماء تحلل صياغة البيانات</span>
            <div class="neural-loading-bar"><span></span></div>
          </div>
        </div>
      </section>

      <footer class="input-processing-zone">
        <div id="attachment-preview-area" class="attachment-preview-area"></div>
        
        <div class="input-shell-container">
          <input type="file" id="system-file-input" style="display: none;" multiple>
          <button id="trigger-attach-btn" class="input-shell-btn" title="إرفاق مستندات أو صور"><i class="fas fa-paperclip"></i></button>
          
          <textarea id="core-message-input" placeholder="أرسل استفسارك العميق، سماء تحلل وتستجيب..." rows="1" autocomplete="off"></textarea>
          
          <button id="execute-send-btn" class="send-prime-btn" title="إرسال البيانات"><i class="fas fa-arrow-up-long"></i></button>
        </div>
      </footer>

    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>

  <script src="/static/script.js"></script>
</body>
</html>
