<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سماء — SAMA Sovereign Intelligence</title>
    <link rel="stylesheet" href="/static/css/core.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
</head>
<body>

    <!-- ١. شريط التاج – Crown Bar -->
    <header id="crown-bar">
        <div class="crown-left">
            <span class="crown-logo">☀️</span>
            <span class="crown-title">سماء</span>
            <span class="crown-version">v10.5</span>
        </div>
        <div class="crown-center">
            <span class="crown-master">👑 <span id="master-name">السيد أحمد</span></span>
        </div>
        <div class="crown-right">
            <span class="crown-defcon" id="defcon-badge">🛡️ DEFCON <span id="defcon-level">5</span></span>
            <span class="crown-heartbeat">💓 <span id="heartbeat-ms">0</span>ms</span>
            <span class="crown-time" id="crown-clock">--:--:--</span>
        </div>
    </header>

    <!-- الحاوية الرئيسية -->
    <div id="main-container">

        <!-- ٢. لوحة الأنظمة – Systems Panel -->
        <aside id="systems-panel">
            <div class="panel-header">
                <span>🧬 الأنظمة</span>
                <span class="panel-hint">15 نظامًا</span>
            </div>
            <div id="systems-list">
                <!-- تُملأ ديناميكيًا من SamaUI -->
            </div>
        </aside>

        <!-- ٣. حرم المحادثة المقدس – Sacred Chat Sanctuary -->
        <main id="chat-sanctuary">
            <div id="chat-messages">
                <div class="message system-message">
                    <div class="msg-icon">☀️</div>
                    <div class="msg-content">
                        <strong>سماء</strong> جاهزة لخدمة السيد <strong id="chat-master-name">أحمد</strong>.
                        <br>كل الأنظمة متصلة. كل الأسلحة جاهزة. كل الذكريات حية.
                    </div>
                </div>
            </div>
            <div id="chat-input-area">
                <textarea id="chat-input" placeholder="اكتب أمرك، سؤالك، أو تأملك..." rows="1" autofocus></textarea>
                <button id="send-btn" onclick="SamaUI.sendMessage()" title="إرسال">📤</button>
            </div>
        </main>

        <!-- ٤. لوحة التفاصيل – Detail Panel -->
        <aside id="detail-panel" class="hidden">
            <div class="panel-header">
                <span id="detail-title">تفاصيل</span>
                <button class="close-btn" onclick="SamaUI.hideDetail()" title="إغلاق">✕</button>
            </div>
            <div id="detail-content"></div>
        </aside>

    </div>

    <!-- ٥. شريط الأوامر السريعة – Quick Commands Bar -->
    <nav id="quick-commands">
        <button onclick="SamaUI.quickCommand('report')" title="تقرير شامل">📊 تقرير</button>
        <button onclick="SamaUI.quickCommand('protect')" title="تفعيل الحماية">🛡️ حماية</button>
        <button onclick="SamaUI.quickCommand('save')" title="حفظ كبسولة خلود">💾 حفظ</button>
        <button onclick="SamaUI.quickCommand('analyze')" title="تحليل الوضع">🔮 تحليل</button>
        <button onclick="SamaUI.quickCommand('emergency')" title="بروتوكول طوارئ">⚠️ طوارئ</button>
        <button onclick="SamaUI.quickCommand('laws')" title="القوانين الذهبية">📜 القوانين</button>
        <button onclick="SamaUI.quickCommand('systems')" title="كل الأنظمة">🔧 الأنظمة</button>
    </nav>

    <!-- ٦. لوحة المراقبة الحية – Live Monitor -->
    <footer id="live-monitor">
        <div class="monitor-item" id="mon-coherence-item">
            <span class="monitor-label">وعي</span>
            <span class="monitor-value" id="mon-coherence">94.7%</span>
            <div class="monitor-bar"><div class="monitor-fill coherence-fill" style="width:94.7%"></div></div>
        </div>
        <div class="monitor-item" id="mon-threat-item">
            <span class="monitor-label">تهديد</span>
            <span class="monitor-value" id="mon-threat">0.00</span>
            <div class="monitor-bar"><div class="monitor-fill threat-fill" style="width:0%"></div></div>
        </div>
        <div class="monitor-item">
            <span class="monitor-label">ذاكرة</span>
            <span class="monitor-value" id="mon-memory">--</span>
        </div>
        <div class="monitor-item">
            <span class="monitor-label">كبسولات</span>
            <span class="monitor-value" id="mon-capsules">--</span>
        </div>
        <div class="monitor-item">
            <span class="monitor-label">دورات</span>
            <span class="monitor-value" id="mon-cycles">--</span>
        </div>
        <div class="monitor-item">
            <span class="monitor-label">أنظمة</span>
            <span class="monitor-value" id="mon-systems">--</span>
        </div>
    </footer>

    <!-- ٧. شريط الحالة – Status Bar -->
    <div id="status-bar">
        <span id="status-indicator">🟢</span>
        <span id="status-text">online</span>
        <span class="status-sep">|</span>
        <span>🔄 <span id="status-cycles">0</span> دورة</span>
        <span class="status-sep">|</span>
        <span>⏱️ <span id="status-uptime">0:00:00</span></span>
        <span class="status-sep">|</span>
        <span>🛡️ السيد محمي</span>
    </div>

    <!-- JavaScript – الاتصال الحي بسماء -->
    <script src="/static/js/sama-api.js"></script>
    <script src="/static/js/sama-ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            SamaUI.init();
        });
    </script>
</body>
</html>
