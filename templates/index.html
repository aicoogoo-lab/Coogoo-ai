<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Driving AI Pro</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Driving AI Pro</h1>
      <p>مساعد هجين: Groq + Gemini</p>
    </header>

    <div class="model-switch">
      <button id="groq-btn" class="model-btn active" data-model="groq">Groq (Llama)</button>
      <button id="gemini-btn" class="model-btn" data-model="gemini">Gemini</button>
    </div>

    <main class="chat-container">
      <div id="messages" class="messages"></div>
      <div id="typing" class="typing hidden">المساعد يكتب الآن…</div>
    </main>

    <footer class="input-area">
      <input
        id="message-input"
        type="text"
        placeholder="اكتب رسالتك هنا..."
      />
      <button id="send-btn">إرسال</button>
    </footer>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
