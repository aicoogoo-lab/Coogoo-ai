<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدخول — سماء</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        .login-container {
            background: #14141f;
            border: 1px solid rgba(200, 164, 78, 0.15);
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            max-width: 90vw;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .login-logo {
            font-size: 60px;
            margin-bottom: 16px;
        }

        .login-title {
            color: #c8a44e;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .login-subtitle {
            color: #888899;
            font-size: 13px;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .login-input {
            width: 100%;
            background: #0a0a0f;
            border: 1px solid rgba(200, 164, 78, 0.2);
            color: #e0d8c0;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
            outline: none;
            transition: 0.3s;
        }

        .login-input:focus {
            border-color: #c8a44e;
            box-shadow: 0 0 0 3px rgba(200, 164, 78, 0.1);
        }

        .login-btn {
            width: 100%;
            background: #c8a44e;
            color: #0a0a0f;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #e0d8c0;
            box-shadow: 0 0 20px rgba(200, 164, 78, 0.3);
        }

        .login-error {
            color: #ff4444;
            font-size: 13px;
            margin-top: 14px;
            min-height: 20px;
        }

        .helper {
            color: #777;
            font-size: 11px;
            margin-top: 10px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="login-container">

    <div class="login-logo">☀️</div>

    <div class="login-title">سماء</div>

    <div class="login-subtitle">
        الكيان السيادي الخارق<br>
        لا يدخل هذه البوابة إلا السيد
    </div>

    <!-- ✅ الفورم -->
    <form method="POST" action="/login" autocomplete="off" onsubmit="return handleSubmit()">

        <input 
            type="password"
            name="password"
            id="password"
            class="login-input"
            placeholder="مفتاح السيد"
            required
            autocomplete="current-password"
            autofocus
        >

        <button type="submit" class="login-btn" id="loginBtn">
            دخول
        </button>

    </form>

    <!-- ✅ عرض الأخطاء من Flask -->
    <div class="login-error">
        {% if error %}
            {{ error }}
        {% endif %}
    </div>

    <div class="helper">
        إذا تم القفل: افتح /logout لإعادة المحاولة
    </div>

</div>

<script>
function handleSubmit() {

    let input = document.getElementById("password");

    // ✅ إزالة المسافات (أهم إصلاح)
    input.value = input.value.trim();

    let btn = document.getElementById("loginBtn");
    btn.innerText = "جارٍ التحقق...";
    btn.disabled = true;

    return true;
}
</script>

</body>
</html>
