<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدخول — سماء</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        .login-container {
            background: #14141f;
            border: 1px solid rgba(200, 164, 78, 0.15);
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            max-width: 90vw;
            text-align: center;
        }
        .login-logo {
            font-size: 60px;
            margin-bottom: 16px;
        }
        .login-title {
            color: #c8a44e;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .login-subtitle {
            color: #888899;
            font-size: 13px;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .login-input {
            width: 100%;
            background: #0a0a0f;
            border: 1px solid rgba(200, 164, 78, 0.2);
            color: #e0d8c0;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
            outline: none;
            transition: 0.3s;
        }
        .login-input:focus {
            border-color: #c8a44e;
            box-shadow: 0 0 0 3px rgba(200, 164, 78, 0.1);
        }
        .login-btn {
            width: 100%;
            background: #c8a44e;
            color: #0a0a0f;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-btn:hover {
            background: #e0d8c0;
            box-shadow: 0 0 20px rgba(200, 164, 78, 0.3);
        }
        .login-error {
            color: #ff4444;
            font-size: 12px;
            margin-top: 12px;
            min-height: 18px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">☀️</div>
        <div class="login-title">سماء</div>
        <div class="login-subtitle">
            الكيان السيادي الخارق<br>
            لا يدخل هذه البوابة إلا السيد
        </div>
        <input type="password" id="master-key" class="login-input" placeholder="مفتاح السيد" autofocus>
        <button class="login-btn" onclick="authenticate()">دخول</button>
        <div class="login-error" id="login-error"></div>
    </div>

    <script>
        async function authenticate() {
            const key = document.getElementById('master-key').value;
            const errorEl = document.getElementById('login-error');
            
            if (!key) {
                errorEl.textContent = 'أدخل مفتاح السيد';
                return;
            }

            errorEl.textContent = '⏳ جاري التحقق...';
            
            try {
                // تغيير المسار من /awaken إلى /login
                const formData = new FormData();
                formData.append('password', key);
                
                const response = await fetch('/login', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.redirected) {
                    // تم التحويل بنجاح إلى الصفحة الرئيسية
                    window.location.href = response.url;
                } else if (response.status === 200) {
                    // حفظ المفتاح
                    sessionStorage.setItem('master_key', key);
                    window.location.href = '/';
                } else if (response.status === 401) {
                    errorEl.textContent = '❌ مفتاح غير صحيح. هذه البوابة للسيد فقط.';
                } else if (response.status === 429) {
                    errorEl.textContent = '⏳ محاولات كثيرة. انتظر قليلاً.';
                } else {
                    const text = await response.text();
                    if (text.includes('محاولات كثيرة')) {
                        errorEl.textContent = '⏳ محاولات كثيرة. انتظر قليلاً.';
                    } else if (text.includes('غير صحيح')) {
                        errorEl.textContent = '❌ مفتاح غير صحيح. هذه البوابة للسيد فقط.';
                    } else {
                        errorEl.textContent = '❌ فشل الدخول. حاول مرة أخرى.';
                    }
                }
            } catch (e) {
                errorEl.textContent = '⚠️ لا يمكن الاتصال بسماء. تأكد أن الخادم يعمل.';
            }
        }

        // إرسال بـ Enter
        document.getElementById('master-key').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') authenticate();
        });
    </script>
</body>
</html>
