<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>سماء • بوابة السيد السيادية</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0D3B2F 0%, #1A1A2E 50%, #0D3B2F 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* خلفية هولوغرافية متحركة */
        .holographic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .holographic-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 40%, rgba(107, 181, 214, 0.15), transparent 55%),
                        radial-gradient(circle at 70% 80%, rgba(155, 89, 182, 0.12), transparent 55%);
            animation: floatBg 25s infinite alternate;
        }

        @keyframes floatBg {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(2%, 3%) rotate(2deg); }
        }

        /* بطاقة تسجيل الدخول السيادية */
        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(26, 26, 46, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 42px;
            width: 90%;
            max-width: 460px;
            border: 1px solid rgba(139, 90, 43, 0.4);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(212, 163, 115, 0.1);
            transition: all 0.3s ease;
        }

        .login-card:hover {
            border-color: rgba(212, 163, 115, 0.6);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        /* الشعار السيادي */
        .logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6BB5D6, #9B59B6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 30px rgba(107, 181, 214, 0.5);
            transition: all 0.3s ease;
        }

        .logo-icon:hover {
            transform: scale(1.05);
            box-shadow: 0 0 45px rgba(107, 181, 214, 0.7);
        }

        .logo-icon i {
            font-size: 40px;
            color: #F5F5F5;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #F5F5F5, #D4A373);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            color: rgba(245, 245, 245, 0.55);
            font-size: 13.5px;
            margin-top: 6px;
        }

        /* الحقول */
        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            color: #D4A373;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(139, 90, 43, 0.4);
            border-radius: 16px;
            color: #F5F5F5;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #6BB5D6;
            box-shadow: 0 0 15px rgba(107, 181, 214, 0.3);
        }

        .input-group input::placeholder {
            color: rgba(245, 245, 245, 0.3);
        }

        /* الأزرار */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6BB5D6, #9B59B6);
            color: #F5F5F5;
            margin-bottom: 12px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(107, 181, 214, 0.4);
        }

        .btn-biometric {
            background: rgba(139, 90, 43, 0.25);
            color: #D4A373;
            border: 1px solid rgba(212, 163, 115, 0.4);
        }

        .btn-biometric:hover {
            background: rgba(139, 90, 43, 0.4);
            border-color: #D4A373;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* حالة التحميل */
        .btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        /* رسائل الخطأ */
        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 12px;
            padding: 12px;
            color: #fca5a5;
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تذييل */
        .footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(245, 245, 245, 0.25);
            font-size: 12px;
        }

        /* استجابة الجوال */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                width: 95%;
            }
            
            .logo h1 {
                font-size: 24px;
            }
            
            .logo-icon {
                width: 65px;
                height: 65px;
            }
            
            .logo-icon i {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="holographic-bg"></div>

    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-infinity"></i>
            </div>
            <h1>سماء • SAMA</h1>
            <p>بوابة السيد المالك المطلق</p>
        </div>

        <!-- تسجيل الدخول بمفتاح السيد -->
        <form id="loginForm" action="/login" method="POST">
            <div class="input-group">
                <label><i class="fas fa-key"></i> مفتاح السيد</label>
                <input type="password" name="password" id="masterPassword" placeholder="أدخل مفتاح السيد السري" required autofocus>
            </div>

            <button type="submit" id="loginBtn" class="btn btn-primary">
                <i class="fas fa-unlock-alt"></i> الدخول بوضع السيد
            </button>
        </form>

        <!-- المصادقة البيومترية -->
        <button id="biometricBtn" class="btn btn-biometric" onclick="startWebAuthn()">
            <i class="fas fa-fingerprint"></i> تسجيل الدخول بالبصمة / الوجه
        </button>

        <div id="errorBox" class="error-message"></div>

        <div class="footer">
            <i class="fas fa-shield-alt"></i> هذه البوابة مخصصة للسيد المالك فقط
        </div>
    </div>

    <script>
        // ============================================================
        // المتغيرات والإعدادات
        // ============================================================
        
        // في الإنتاج، هذا المفتاح يُقرأ من الخادم، لكن هنا للعرض فقط
        // المصادقة الحقيقية تتم عبر /login endpoint في app.py
        
        // ============================================================
        // عرض رسائل الخطأ
        // ============================================================
        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = message;
            errorBox.classList.add('show');
            
            setTimeout(() => {
                errorBox.classList.remove('show');
            }, 4000);
        }
        
        // ============================================================
        // تأثير التحميل على الأزرار
        // ============================================================
        function setLoading(button, isLoading) {
            if (isLoading) {
                button.classList.add('loading');
                button.disabled = true;
            } else {
                button.classList.remove('loading');
                button.disabled = false;
            }
        }
        
        // ============================================================
        // معالجة تسجيل الدخول (مع تجربة وإعادة محاولة)
        // ============================================================
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('masterPassword').value.trim();
            
            if (!password) {
                showError('الرجاء إدخال مفتاح السيد');
                return;
            }
            
            setLoading(loginBtn, true);
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        'password': password
                    })
                });
                
                if (response.redirected) {
                    // تسجيل الدخول ناجح - انتقل إلى صفحة السيد
                    window.location.href = response.url;
                } else if (response.status === 401) {
                    const text = await response.text();
                    showError(text || 'كلمة مرور غير صحيحة');
                } else if (response.status === 429) {
                    const text = await response.text();
                    showError(text || 'محاولات كثيرة. حاول لاحقاً.');
                } else {
                    showError('حدث خطأ غير متوقع. حاول مرة أخرى.');
                }
            } catch (err) {
                console.error('Login error:', err);
                showError('حدث خطأ في الاتصال بالخادم');
            } finally {
                setLoading(loginBtn, false);
            }
        });
        
        // ============================================================
        // WebAuthn - المصادقة البيومترية
        // ============================================================
        async function startWebAuthn() {
            const biometricBtn = document.getElementById('biometricBtn');
            
            if (!window.PublicKeyCredential) {
                showError('المتصفح لا يدعم المصادقة البيومترية (WebAuthn)');
                return;
            }
            
            setLoading(biometricBtn, true);
            
            try {
                // التحقق من توفر مصادق بيومتري على الجهاز
                const isAvailable = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
                
                if (!isAvailable) {
                    showError('لا يوجد مصادق بيومتري متاح على هذا الجهاز');
                    setLoading(biometricBtn, false);
                    return;
                }
                
                // في التطبيق الكامل، هنا سيتم الاتصال بـ /webauthn/authenticate
                // ولكن حالياً سنوجه المستخدم لاستخدام طريقة مفتاح السيد
                showError('🔐 المصادقة البيومترية قيد التطوير. يُرجى استخدام مفتاح السيد حالياً.');
                
                /* للإصدارات القادمة - WebAuthn كامل:
                
                const optionsResponse = await fetch('/webauthn/authenticate-options');
                const options = await optionsResponse.json();
                
                const assertion = await navigator.credentials.get({ publicKey: options });
                
                const verifyResponse = await fetch('/webauthn/authenticate-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(assertion)
                });
                
                if (verifyResponse.ok) {
                    window.location.href = '/sovereign';
                } else {
                    showError('فشلت المصادقة البيومترية');
                }
                */
                
            } catch (err) {
                console.error('WebAuthn error:', err);
                showError('حدث خطأ أثناء المصادقة البيومترية');
            } finally {
                setLoading(biometricBtn, false);
            }
        }
        
        // ============================================================
        // التحقق من الجلسة الحالية - تجاوز مباشر إذا كان مسجلاً
        // ============================================================
        async function checkExistingSession() {
            try {
                const response = await fetch('/sovereign', { method: 'HEAD' });
                if (response.redirected === false && response.ok) {
                    // قد يكون هناك جلسة نشطة
                    // نختبر بشكل آمن
                    const statusResponse = await fetch('/api/master/status', {
                        headers: { 'X-Requested-With': 'XMLHttpRequest' }
                    });
                    if (statusResponse.ok) {
                        window.location.href = '/sovereign';
                    }
                }
            } catch (err) {
                // لا تفعل شيئاً
            }
        }
        
        // فحص الجلسة النشطة (اختياري)
        // checkExistingSession();
        
        // ============================================================
        // تحسينات إضافية: إزالة رسالة الخطأ عند البدء بالكتابة
        // ============================================================
        const passwordInput = document.getElementById('masterPassword');
        passwordInput.addEventListener('input', function() {
            const errorBox = document.getElementById('errorBox');
            errorBox.classList.remove('show');
        });
        
        // ============================================================
        // دعم إرسال النموذج بالضغط على Enter
        // ============================================================
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
