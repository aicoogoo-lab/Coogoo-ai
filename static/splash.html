<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyOS v10.0 — Loading</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      background: linear-gradient(135deg, #0a0a14, #141428, #1a0040);
      background-size: 200% 200%;
      animation: bgMove 6s ease-in-out infinite, fadeOut 4.8s ease-in-out forwards;
      display: flex;
      flex-direction: column; /* ترتيب العناصر عمودياً */
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      position: relative;
      overflow: hidden;
      font-family: 'Cairo', sans-serif;
    }

    /* حاوية الشعار والنص */
    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }

    /* الشعار الهولوجرافي المحدث */
    .logo {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      font-weight: bold;
      color: #fff;
      opacity: 0;
      animation: 
        popIn 1.2s ease-out forwards,
        glow 2s ease-in-out infinite alternate,
        pulse 2.4s ease-in-out infinite;
      position: relative;
      box-shadow: 0 0 30px rgba(192, 132, 252, 0.4);
    }

    /* النص المستقبلي */
    .text {
      color: #ffffff;
      margin-top: 25px;
      text-align: center;
      opacity: 0;
      animation: slideUp 1.4s ease-out 0.5s forwards; /* يبدأ بعد ظهور الشعار بقليل */
    }

    .text h1 {
      font-size: 1.8rem;
      margin: 0;
      background: linear-gradient(135deg, #fff, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .text p {
      font-size: 0.9rem;
      color: #9ca3af;
      margin-top: 5px;
      letter-spacing: 1px;
    }

    /* موجة ضوئية هيدروليكية */
    .wave {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.4), transparent 70%);
      animation: wavePulse 2.8s ease-out infinite;
      z-index: 1;
      opacity: 0.7;
    }

    /* حركة الموجة */
    @keyframes wavePulse {
      0%   { transform: scale(1); opacity: 0.8; }
      70%  { transform: scale(8); opacity: 0; }
      100% { transform: scale(8); opacity: 0; }
    }

    /* توهج مزدوج متناسق مع الألوان الجديدة */
    @keyframes glow {
      from { filter: drop-shadow(0 0 15px #00eaff); }
      to   { filter: drop-shadow(0 0 35px #7c3aed); }
    }

    /* نبض ضوئي */
    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    /* دخول الشعار */
    @keyframes popIn {
      0%   { transform: scale(0.6); opacity: 0; }
      60%  { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* دخول النص */
    @keyframes slideUp {
      0%   { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* حركة الخلفية السائلة */
    @keyframes bgMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* خروج السبلاتش بسلاسة قبل النقل مباشرة */
    @keyframes fadeOut {
      85%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="wave"></div>

  <div class="splash-container">
    <div class="logo">S</div>
    
    <div class="text">
      <h1>SkyOS v10.0</h1>
      <p>Holographic Intelligent Core</p>
    </div>
  </div>

  <script>
    // الانتظار لمدة 4.6 ثانية (قبل انتهاء الـ fadeOut تماماً) لنقل المستخدم بسلاسة لواجهة الشات الرئيسية
    setTimeout(() => {
      window.location.href = "/";
    }, 4600);
  </script>
</body>
</html>
