<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سماء — SAMA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        .splash-container {
            text-align: center;
        }
        .splash-logo {
            font-size: 80px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.05); }
        }
        .splash-title {
            color: #c8a44e;
            font-size: 32px;
            font-weight: 700;
            margin-top: 16px;
            letter-spacing: 2px;
        }
        .splash-subtitle {
            color: #888899;
            font-size: 14px;
            margin-top: 8px;
        }
        .splash-loader {
            margin-top: 32px;
            width: 120px;
            height: 3px;
            background: #1a1a2e;
            border-radius: 2px;
            overflow: hidden;
            margin-left: auto;
            margin-right: auto;
        }
        .splash-loader-fill {
            height: 100%;
            background: #c8a44e;
            width: 0%;
            animation: load 2.5s ease forwards;
        }
        @keyframes load {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="splash-logo">☀️</div>
        <div class="splash-title">سماء</div>
        <div class="splash-subtitle">SAMA v10.5 — الكيان السيادي الخارق</div>
        <div class="splash-loader">
            <div class="splash-loader-fill"></div>
        </div>
    </div>
    <script>
        setTimeout(() => {
            window.location.href = '/';
        }, 2800);
    </script>
</body>
</html>
